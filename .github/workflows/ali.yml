name: Imperial V-MAX - Ultimate Firewall & Offset Sniper

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_ultimate_combo:
    name: Compile Ultimate Hybrid Dylib
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Fishhook
        run: |
          mkdir -p jni
          curl -sL https://raw.githubusercontent.com/facebook/fishhook/master/fishhook.c -o jni/fishhook.c
          curl -sL https://raw.githubusercontent.com/facebook/fishhook/master/fishhook.h -o jni/fishhook.h

      - name: Generate Hybrid Payload (Main.mm)
        run: |
          cat <<'EOF' > jni/main.mm
          #import <Foundation/Foundation.h>
          #import <mach/mach.h>
          #import <mach-o/dyld.h>
          #import <dlfcn.h>
          #import <netdb.h>
          #include "fishhook.h"

          /**
           * ========================================================
           * 🛡️ MASOUD HYBRID ENGINE (OFFSET SNIPER + NETWORK FIREWALL)
           * 🎯 TARGET: OFFSET 0x459C (CPU HWBP)
           * 🚫 FIREWALL: Block Spy Domains from getconfig
           * ========================================================
           */

          static uintptr_t g_anogs_base = 0;
          static uintptr_t g_target_addr = 0;

          // ==========================================
          // 🛡️ 1. الجدار الناري (Network Firewall)
          // ==========================================
          static int (*orig_getaddrinfo)(const char *node, const char *service, const struct addrinfo *hints, struct addrinfo **res);

          int hk_getaddrinfo(const char *node, const char *service, const struct addrinfo *hints, struct addrinfo **res) {
              if (node) {
                  NSString *domain = [NSString stringWithUTF8String:node];
                  // الروابط اللي إنت صدتها بملف الـ JSON
                  NSArray *blacklist = @[
                      @"tdatamaster.qq.com", 
                      @"crashsight.qq.com", 
                      @"cloudctrl.qq.com", 
                      @"anogs.qq.com",
                      @"telemetry.pubgm.com"
                  ];
                  
                  for (NSString *blocked in blacklist) {
                      if ([domain containsString:blocked]) {
                          NSLog(@"[MASOUD FIREWALL] 🚫 Blocked Snitch Connection to: %@", domain);
                          return EAI_NONAME; // "Server not found" - خداع الجاسوس
                      }
                  }
              }
              return orig_getaddrinfo(node, service, hints, res);
          }

          // ==========================================
          // ⚡ 2. قناص المعالج (CPU HWBP Sniper)
          // ==========================================
          void HWBP_Trap_Handler(int signum, siginfo_t *info, void *context) {
              ucontext_t *uc = (ucontext_t *)context;
              _STRUCT_ARM_THREAD_STATE64 *state = &uc->uc_mcontext->__ss;

              if (state->__pc == g_target_addr) {
                  state->__x[0] = 0; // تنفيذ تعديل مسعود (MOV X0, #0)
                  state->__pc += 4;  // القفز للسطر التالي
                  NSLog(@"[MASOUD SNIPER] 🎯 Headshot at 0x%lx! Scanner blinded.", state->__pc);
              }
          }

          void PlantHWBP() {
              thread_act_array_t threads;
              mach_msg_type_number_t count;
              if (task_threads(mach_task_self(), &threads, &count) != KERN_SUCCESS) return;

              for (int i = 0; i < count; i++) {
                  arm_debug_state64_t dbg;
                  mach_msg_type_number_t dbg_count = ARM_DEBUG_STATE64_COUNT;
                  if (thread_get_state(threads[i], ARM_DEBUG_STATE64, (thread_state_t)&dbg, &dbg_count) == KERN_SUCCESS) {
                      dbg.__bvr[0] = g_target_addr;
                      dbg.__bcr[0] = 0x1E5; // Enable HWBP Exec
                      thread_set_state(threads[i], ARM_DEBUG_STATE64, (thread_state_t)&dbg, ARM_DEBUG_STATE64_COUNT);
                  }
              }
          }

          // ==========================================
          // 🚀 تشغيل المحرك الهجين
          // ==========================================
          __attribute__((constructor))
          static void start_masoud_hybrid() {
              NSLog(@"[MASOUD LAB] 🦅 Hybrid Engine Initializing...");

              // تفعيل الجدار الناري فوراً
              struct rebinding hooks[] = {
                  {"getaddrinfo", (void *)hk_getaddrinfo, (void **)&orig_getaddrinfo}
              };
              rebind_symbols(hooks, 1);

              // إعداد قناص المعالج
              struct sigaction sa;
              memset(&sa, 0, sizeof(sa));
              sa.sa_sigaction = HWBP_Trap_Handler;
              sa.sa_flags = SA_SIGINFO;
              sigaction(SIGTRAP, &sa, NULL);

              dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_HIGH, 0), ^{
                  while (g_target_addr == 0) {
                      for (uint32_t i = 0; i < _dyld_image_count(); i++) {
                          if (strstr(_dyld_get_image_name(i), "anogs")) {
                              g_anogs_base = (uintptr_t)_dyld_get_image_header(i);
                              g_target_addr = g_anogs_base + 0x459C; // أوفست مسعود الذهبي
                              break;
                          }
                      }
                      sleep(1);
                  }
                  PlantHWBP();
                  NSLog(@"[MASOUD LAB] ✅ Hybrid Engine is ACTIVE. Sniper on 0x459C + Firewall on!");
              });
          }
          EOF

      - name: Compile Hybrid Dylib
        run: |
          clang++ -dynamiclib -std=c++11 -arch arm64 \
          -isysroot $(xcroot --sdk iphoneos --show-sdk-path) \
          jni/main.mm jni/fishhook.c -o Masoud-Hybrid-Combo.dylib \
          -framework Foundation
          strip -x Masoud-Hybrid-Combo.dylib

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Masoud-Hybrid-Combo
          path: Masoud-Hybrid-Combo.dylib
