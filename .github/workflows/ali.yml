name: Imperial V-MAX - 15s Sync & 5-Point Shield

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_shield:
    name: Compile 15s Synced Dylib
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Fishhook
        run: |
          mkdir -p jni
          curl -sL https://raw.githubusercontent.com/facebook/fishhook/master/fishhook.c -o jni/fishhook.c
          curl -sL https://raw.githubusercontent.com/facebook/fishhook/master/fishhook.h -o jni/fishhook.h

      - name: Generate Synced Source (Main.mm)
        run: |
          cat <<'EOF' > jni/main.mm
          #import <Foundation/Foundation.h>
          #import <UIKit/UIKit.h>
          #import <objc/runtime.h>
          #import <sys/socket.h>
          #import <arpa/inet.h>
          #import <sys/stat.h>
          #import <dlfcn.h>
          #include "fishhook.h"

          // ⚠️⚠️ تنبيه مهم لمسعود: غير هذا الآيبي إلى آيبي حاسبتك الفعلي (IPv4)
          #define RADAR_SERVER_IP "pubg.myvnc.com" 
          #define RADAR_SERVER_PORT 8080

          // ==========================================
          // 📡 نظام الاتصال الحي بالترمنال
          // ==========================================
          void SendToMasoudTerminal(NSString* action, NSString* details) {
              dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_BACKGROUND, 0), ^{
                  NSDictionary *payload = @{
                      @"type": @"SYNC_LOG",
                      @"caller": @"Masoud_Dylib",
                      @"func": action,
                      @"target": details
                  };
                  NSData *json = [NSJSONSerialization dataWithJSONObject:payload options:0 error:nil];
                  if (!json) return;

                  int sock = socket(AF_INET, SOCK_DGRAM, 0);
                  if (sock > 0) {
                      struct sockaddr_in srv;
                      srv.sin_family = AF_INET;
                      srv.sin_port = htons(RADAR_SERVER_PORT);
                      inet_pton(AF_INET, RADAR_SERVER_IP, &srv.sin_addr);
                      sendto(sock, [json bytes], [json length], 0, (struct sockaddr *)&srv, sizeof(srv));
                      close(sock);
                  }
              });
          }

          // ==========================================
          // 🛡️ النقاط الـ 5 لكشف النسخ المكركة (Spoofing)
          // ==========================================
          
          void SafeSwizzle(Class c, SEL orig, IMP newImp, IMP* oldImp) {
              Method m = class_getInstanceMethod(c, orig);
              if (!m) m = class_getClassMethod(c, orig);
              if (m) { *oldImp = method_getImplementation(m); method_setImplementation(m, newImp); }
          }

          // 🟢 النقطة 1: إخفاء ملف الشهادة (mobileprovision)
          typedef BOOL (*fileExistsAtPath_t)(id, SEL, NSString *);
          static fileExistsAtPath_t orig_fileExistsAtPath;
          BOOL hk_fileExistsAtPath(id self, SEL _cmd, NSString *path) {
              if (path && [path isKindOfClass:[NSString class]]) {
                  if ([path containsString:@"embedded.mobileprovision"]) {
                      SendToMasoudTerminal(@"[CHECK 1 PASSED]", @"Hidden embedded.mobileprovision");
                      return NO; 
                  }
              }
              return orig_fileExistsAtPath(self, _cmd, path);
          }

          // 🟢 النقطة 2: تزييف هوية المطور للآب ستور (SignerIdentity)
          typedef NSDictionary* (*infoDict_t)(id, SEL);
          static infoDict_t orig_infoDict;
          NSDictionary* hk_infoDict(id self, SEL _cmd) {
              NSDictionary *dict = orig_infoDict(self, _cmd);
              if (!dict) return nil;
              NSMutableDictionary *mDict = [dict mutableCopy];
              if (mDict) {
                  [mDict setObject:@"Apple iPhone OS Application Signer" forKey:@"SignerIdentity"];
                  [mDict setObject:@"com.apple.itunes.store" forKey:@"AppStoreInstaller"];
                  return [mDict copy];
              }
              return dict;
          }

          // 🟢 النقطة 3: توجيه إيصال الشراء الرسمي
          void SpoofReceipt() {
              method_setImplementation(class_getInstanceMethod([NSBundle class], @selector(appStoreReceiptURL)), 
                  imp_implementationWithBlock(^NSURL* (id self) {
                      return [NSURL fileURLWithPath:@"/System/Library/PrivateFrameworks/StoreServices.framework/receipt"];
                  }));
          }

          // 🟢 النقطة 4 و 5: التوجيه المزدوج لـ (Shadow & anogs)
          static FILE* (*orig_fopen)(const char *filename, const char *mode);
          static int (*orig_access)(const char *path, int amode);

          const char* GetCleanPath(const char* originalPath) {
              if (!originalPath) return originalPath;
              NSString* p = [NSString stringWithUTF8String:originalPath];
              if ([p containsString:@"_original.dat"]) return originalPath;
              
              if ([p containsString:@"anogs.dylib"]) {
                  SendToMasoudTerminal(@"[CHECK 4 PASSED]", @"anogs redirected to anogs_original.dat");
                  return strdup([[p stringByReplacingOccurrencesOfString:@"anogs.dylib" withString:@"anogs_original.dat"] UTF8String]);
              }
              if ([p containsString:@"ShadowTrackerExtra"]) {
                  SendToMasoudTerminal(@"[CHECK 5 PASSED]", @"Shadow redirected to ShadowTracker_original.dat");
                  return strdup([[p stringByReplacingOccurrencesOfString:@"ShadowTrackerExtra" withString:@"ShadowTracker_original.dat"] UTF8String]);
              }
              return originalPath;
          }

          FILE* hk_fopen(const char *filename, const char *mode) { return orig_fopen(GetCleanPath(filename), mode); }
          int hk_access(const char *path, int amode) { return orig_access(GetCleanPath(path), amode); }

          // ==========================================
          // 🚀 نظام المزامنة والعد التنازلي (15 ثانية)
          // ==========================================
          __attribute__((constructor))
          static void deploy_15s_sync() {
              // إرسال إشارة للترمنال أن الدايلب دخل اللعبة
              SendToMasoudTerminal(@"[SYSTEM]", @"🦅 Masoud Dylib Injected. Waiting 15s for Engine to unpack...");
              
              // نبضات كل 3 ثواني للترمنال حتى تعرف انه كاعد يشتغل
              for (int i = 3; i <= 12; i += 3) {
                  dispatch_after(dispatch_time(DISPATCH_TIME_NOW, i * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                      SendToMasoudTerminal(@"[TIMER]", [NSString stringWithFormat:@"Engine stabilizing... %d seconds passed", i]);
                  });
              }

              // اللحظة الحاسمة: تفعيل الـ 5 نقاط بعد 15 ثانية بالتمام!
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 15 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  
                  SendToMasoudTerminal(@"[SYSTEM]", @"🚀 15s Reached! Deploying the 5-Point Anti-Crack Shield...");
                  
                  SafeSwizzle([NSFileManager class], @selector(fileExistsAtPath:), (IMP)hk_fileExistsAtPath, (IMP*)&orig_fileExistsAtPath);
                  SafeSwizzle([NSBundle class], @selector(infoDictionary), (IMP)hk_infoDict, (IMP*)&orig_infoDict);
                  SpoofReceipt();
                  
                  struct rebinding hooks[] = {
                      {"fopen", (void *)hk_fopen, (void **)&orig_fopen},
                      {"access", (void *)hk_access, (void **)&orig_access}
                  };
                  rebind_symbols(hooks, 2);
                  
                  SendToMasoudTerminal(@"[SUCCESS]", @"✅ All 5 Checks Spoofed Successfully! You are fully protected.");
              });
          }
          EOF

      - name: 🚀 Compile 15s Synced Dylib
        run: |
          clang++ -dynamiclib -std=c++11 -arch arm64 \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          jni/main.mm jni/fishhook.c -o Masoud-15s-Shield.dylib \
          -framework Foundation -framework UIKit -lobjc
          strip -x Masoud-15s-Shield.dylib

      - name: 📦 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Masoud-15s-Shield-Dylib
          path: Masoud-15s-Shield.dylib
