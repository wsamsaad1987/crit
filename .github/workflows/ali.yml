          // 🔄 التوجيه المزدوج الدقيق جداً (Precision Redirector)
          const char* GetRedirectedPath(const char* originalPath) {
              if (!g_is_engine_stable || !originalPath) return originalPath;
    
              NSString* pathStr = [NSString stringWithUTF8String:originalPath];
              if ([pathStr containsString:@"_original.dat"]) return originalPath;
    
              // 🎯 التصحيح هنا: نستخدم hasSuffix للتأكد من أننا نستهدف الملف نفسه، وليس مجلد الخرائط!
              if ([pathStr hasSuffix:@"/anogs.dylib"]) {
                  NSString* cleanPath = [pathStr stringByReplacingOccurrencesOfString:@"/anogs.dylib" withString:@"/anogs_original.dat"];
                  SendToWebRadar(@"FILE_REDIRECT", @"anogs.dylib", @"SUCCESS (To Original)");
                  return strdup([cleanPath UTF8String]);
