name: Imperial V-MAX - Professional Security Research Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # يسمح لك بتشغيل البناء يدوياً من واجهة غيت هاب

jobs:
  build_masoud_fortress:
    name: Build Elite Security Dylib (PoC)
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🛠️ Install Dependencies (CMake)
        run: brew install cmake

      - name: 🛡️ Clone & Build Dobby Engine (Fixed Architecture)
        run: |
          echo "Fetching Dobby Hooking Engine..."
          git clone --depth 1 https://github.com/jmpews/Dobby.git
          mkdir -p Dobby/build && cd Dobby/build
          
          # 🔥 إصلاح خطأ Processor not configured وإجبار المعمارية للآيفون
          cmake .. \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_SYSTEM_PROCESSOR=arm64 \
            -DDOBBY_TARGET_ARCH=arm64 \
            -DDOBBY_GENERATE_SHARED=OFF \
            -DDOBBY_DEBUG=OFF
            
          make -j$(sysctl -n hw.ncpu)
          cd ../.. && mkdir -p include && cp Dobby/include/dobby.h include/

      - name: 🧪 Generate Poisoned Well Source (Main.mm)
        run: |
          mkdir -p jni
          cat <<'EOF' > jni/main.mm
          #import <Foundation/Foundation.h>
          #import <dlfcn.h>
          #import <mach-o/dyld.h>
          #import <string.h>
          #include "dobby.h"

          /**
           * 🛡️ PROJECT: THE POISONED WELL (V-MAX PoC)
           * 👨‍💻 RESEARCHER: MASOUD (NASIRIYAH)
           * 🔍 TARGET: Manual Symbol Resolution Spoofing
           */

          static void* (*orig_dlsym)(void* handle, const char* symbol);
          static const char* (*orig_dyld_get_image_name)(uint32_t image_index);

          // دالة التزييف - تخفي الدايلب وتعيد اسم مكتبة نظام رسمية
          const char* hk_dyld_get_image_name(uint32_t image_index) {
              const char* real_name = orig_dyld_get_image_name(image_index);
              // إذا اللعبة حاولت تصيد اسم الدايلب مالتنا "Masoud" أو "VMAX"
              if (real_name && (strstr(real_name, "Masoud") || strstr(real_name, "VMAX"))) {
                  return "/usr/lib/libobjc.A.dylib";
              }
              return real_name;
          }

          // هوك dlsym - يقوم بتسميم النتائج العائدة لـ IDA qword_10A21F708
          void* hk_dlsym(void* handle, const char* symbol) {
              // 🔥 حماية من الكراش: تأكد أن الرمز ليس فارغاً (تمنع EXC_BAD_ACCESS)
              if (!symbol) return orig_dlsym(handle, symbol);

              if (strcmp(symbol, "_dyld_get_image_name") == 0) {
                  return (void*)hk_dyld_get_image_name;
              }
              return orig_dlsym(handle, symbol);
          }

          __attribute__((constructor(101)))
          static void initialize_fortress() {
              // الحصول على عناوين الدوال الأصلية بأمان
              void* dlsym_ptr = dlsym(RTLD_DEFAULT, "dlsym");
              orig_dyld_get_image_name = (const char* (*)(uint32_t))dlsym(RTLD_DEFAULT, "_dyld_get_image_name");

              // تفعيل عملية الحقن باستخدام محرك Dobby
              if (dlsym_ptr) {
                  DobbyHook(dlsym_ptr, (void*)hk_dlsym, (void**)&orig_dlsym);
              }
              
              NSLog(@"[V-MAX PoC] 🏰 Security Shield Integrated Successfully. dlsym is poisoned.");
          }
          EOF

      - name: 🚀 Compile Professional Dylib (Fixed Linking)
        run: |
          # 🔥 إصلاح خطأ expected unqualified-id بالفصل الصحيح للمكتبة
          clang++ -dynamiclib -std=c++11 \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -arch arm64 \
          -I./include \
          jni/main.mm \
          Dobby/build/libdobby.a \
          -o Masoud-VMAX-Elite.dylib \
          -framework Foundation -framework UIKit -lobjc \
          -install_name @rpath/Masoud-VMAX-Elite.dylib
          
          # مسح الرموز لزيادة مستوى التخفي
          strip -x Masoud-VMAX-Elite.dylib

      - name: 📦 Archive Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Masoud-Elite-Fortress-PoC
          path: Masoud-VMAX-Elite.dylib
