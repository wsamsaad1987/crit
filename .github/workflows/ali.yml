name: Imperial V-MAX - Master Security Proof

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_master_poc:
    name: Build Ultimate 10-Point & SVC Shield
    runs-on: macos-latest

    steps:
      - name: 📥 سحب الكود المصدري
        uses: actions/checkout@v4

      - name: 🎣 تحميل محرك Fishhook الآمن
        run: |
          mkdir -p jni
          curl -sL https://raw.githubusercontent.com/facebook/fishhook/master/fishhook.c -o jni/fishhook.c
          curl -sL https://raw.githubusercontent.com/facebook/fishhook/master/fishhook.h -o jni/fishhook.h

      - name: 🧪 توليد الكود المصدري للدايلب (Main.mm)
        run: |
          cat <<'EOF' > jni/main.mm
          #import <Foundation/Foundation.h>
          #import <UIKit/UIKit.h>
          #import <objc/runtime.h>
          #import <unistd.h>
          #import <sys/syscall.h>
          #import <string.h>
          #import <dlfcn.h>
          #import <mach-o/dyld.h>
          #include "fishhook.h"

          // ⚠️ رابط سيرفر مسعود (RDP)
          #define RADAR_SERVER_URL @"http://34.204.178.160:8080" 

          // دالة مساعدة لتبديل دوال الـ Objective-C بأمان
          void SafeSwizzle(Class c, SEL orig, IMP newImp, IMP* oldImp) {
              Method m = class_getInstanceMethod(c, orig);
              if (!m) m = class_getClassMethod(c, orig);
              if (m) { *oldImp = method_getImplementation(m); method_setImplementation(m, newImp); }
          }

          // ==========================================
          // 🛡️ التزييف الذكي (Smart Spoofing) لحل كراش تسجيل الدخول
          // ==========================================
          
          typedef NSString* (*bundleId_t)(id, SEL);
          static bundleId_t orig_bundleId;
          
          // [1] تزييف الهوية الذكي
          NSString* hk_bundleId(id self, SEL _cmd) {
              Dl_info info;
              // نفحص منو اللي طلب الهوية؟ اللعبة أم نظام آبل؟
              if (dladdr(__builtin_return_address(0), &info) && info.dli_fname) {
                  NSString *caller = [NSString stringWithUTF8String:info.dli_fname];
                  // إذا كان المتصل هو نظام آبل (خدمات تسجيل الدخول، الايكلاود، سفاري) نعطيه الهوية الحقيقية لمنع الكراش
                  if ([caller containsString:@"/System/Library/"]) {
                      return orig_bundleId(self, _cmd);
                  }
              }
              // إذا كانت اللعبة هي التي تسأل، نكذب عليها
              return @"com.tencent.ig";
          }

          typedef NSDictionary* (*infoDict_t)(id, SEL);
          static infoDict_t orig_infoDict;
          
          // [6, 7] تزييف الشهادة الذكي
          NSDictionary* hk_infoDict(id self, SEL _cmd) {
              NSDictionary *dict = orig_infoDict(self, _cmd);
              if (!dict) return nil;
              
              Dl_info info;
              // نفس الفكرة، إذا نظام آبل طلب معلومات التطبيق عند تسجيل الدخول نعطيه الحقيقي
              if (dladdr(__builtin_return_address(0), &info) && info.dli_fname) {
                  NSString *caller = [NSString stringWithUTF8String:info.dli_fname];
                  if ([caller containsString:@"/System/Library/"]) {
                      return dict;
                  }
              }

              NSMutableDictionary *mDict = [dict mutableCopy];
              if (mDict) {
                  [mDict setObject:@"Apple iPhone OS Application Signer" forKey:@"SignerIdentity"];
                  [mDict setObject:@"com.apple.itunes.store" forKey:@"AppStoreInstaller"];
                  return [mDict copy];
              }
              return dict;
          }

          // [8] تعمية الروابط المحسنة (السماح لروابط تسجيل الدخول)
          typedef id (*URLWithString_t)(id, SEL, NSString *);
          static URLWithString_t orig_URLWithString;
          id hk_URLWithString(id self, SEL _cmd, NSString *urlStr) {
              if (urlStr && [urlStr isKindOfClass:[NSString class]]) {
                  // السماح بروابط تسجيل الدخول وتوثيق الحسابات لتجنب الفصل والكراش
                  if ([urlStr containsString:@"facebook"] || [urlStr containsString:@"apple"] || [urlStr containsString:@"twitter"]) {
                      return orig_URLWithString(self, _cmd, urlStr);
                  }
                  // حجب خوادم التجسس الخاصة بـ Tencent فقط (بدل حجب كلمة tencent بالكامل التي تكسر اللعبة)
                  if ([urlStr containsString:@"tdatamaster"] || [urlStr containsString:@"crashsight"] || [urlStr containsString:@"anogs"]) {
                      return orig_URLWithString(self, _cmd, @"http://127.0.0.1");
                  }
              }
              return orig_URLWithString(self, _cmd, urlStr);
          }

          // ==========================================
          // 🛡️ حماية الذاكرة والملفات (Fishhook & File Shield)
          // ==========================================
          
          static void* (*orig_dlsym)(void* handle, const char* symbol);
          static const char* (*orig_dyld_get_image_name)(uint32_t image_index);

          const char* hk_dyld_get_image_name(uint32_t image_index) {
              const char* name = orig_dyld_get_image_name(image_index);
              if (name && (strstr(name, "Masoud") || strstr(name, "VMAX"))) return "/usr/lib/libobjc.A.dylib";
              return name;
          }

          void* hk_dlsym(void* handle, const char* symbol) {
              if (!symbol) return orig_dlsym(handle, symbol);
              if (strcmp(symbol, "_dyld_get_image_name") == 0) return (void*)hk_dyld_get_image_name;
              return orig_dlsym(handle, symbol);
          }

          typedef BOOL (*fileExistsAtPath_t)(id, SEL, NSString *);
          static fileExistsAtPath_t orig_fileExistsAtPath;
          BOOL hk_fileExistsAtPath(id self, SEL _cmd, NSString *path) {
              if (path && [path isKindOfClass:[NSString class]] && ([path containsString:@"mobileprovision"] || [path containsString:@"Masoud"] || [path containsString:@"Cydia"])) {
                  return NO;
              }
              return orig_fileExistsAtPath(self, _cmd, path);
          }

          // تفعيل النقاط
          void ApplySmartSpoofing() {
              // 1. تفعيل الهوية الذكية (تمنع كراش تسجيل الدخول)
              SafeSwizzle([NSBundle class], @selector(bundleIdentifier), (IMP)hk_bundleId, (IMP*)&orig_bundleId);
              
              // 2, 3, 4, 5. الهاردوير والموديل
              method_setImplementation(class_getInstanceMethod([UIDevice class], @selector(model)), imp_implementationWithBlock(^NSString* (id self) { return @"iPad"; }));
              method_setImplementation(class_getInstanceMethod([UIDevice class], @selector(systemVersion)), imp_implementationWithBlock(^NSString* (id self) { return @"17.4"; }));
              method_setImplementation(class_getInstanceMethod([NSProcessInfo class], @selector(physicalMemory)), imp_implementationWithBlock(^unsigned long long(id self) { return 17179869184ULL; }));
              method_setImplementation(class_getInstanceMethod([NSProcessInfo class], @selector(activeProcessorCount)), imp_implementationWithBlock(^NSUInteger(id self) { return 8; }));
              
              // 6, 7. الشهادة الذكية والإيصال
              SafeSwizzle([NSBundle class], @selector(infoDictionary), (IMP)hk_infoDict, (IMP*)&orig_infoDict);
              method_setImplementation(class_getInstanceMethod([NSBundle class], @selector(appStoreReceiptURL)), imp_implementationWithBlock(^NSURL* (id self) { return [NSURL fileURLWithPath:@"/System/Library/PrivateFrameworks/StoreServices.framework/receipt"]; }));

              // 8. الروابط المفلترة
              SafeSwizzle([NSURL class], @selector(URLWithString:), (IMP)hk_URLWithString, (IMP*)&orig_URLWithString);

              // 10. درع الملفات
              SafeSwizzle([NSFileManager class], @selector(fileExistsAtPath:), (IMP)hk_fileExistsAtPath, (IMP*)&orig_fileExistsAtPath);
          }

          // ==========================================
          // ⚔️ الجزء الثاني: إثبات اختراق النواة (SVC Kernel Bypass)
          // ==========================================
          int check_file_standard(const char *path) { return access(path, F_OK); }
          int check_file_svc(const char *path) {
              int result;
              __asm__ volatile (
                  "mov x0, %1\n"
                  "mov x1, #0\n"
                  "mov x16, #33\n"
                  "svc #0x80\n"
                  "mov %w0, w0\n"
                  : "=r" (result) : "r" (path) : "x0", "x1", "x16", "memory"
              );
              return result;
          }

          // ==========================================
          // 🚀 نقطة الانطلاق وإرسال التقرير
          // ==========================================
          __attribute__((constructor))
          static void deploy_ultimate_fortress() {
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 3 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  
                  // تفعيل الخطافات
                  orig_dyld_get_image_name = (const char* (*)(uint32_t))dlsym(RTLD_DEFAULT, "_dyld_get_image_name");
                  struct rebinding rebinds[] = { {"dlsym", (void *)hk_dlsym, (void **)&orig_dlsym} };
                  rebind_symbols(rebinds, 1);

                  ApplySmartSpoofing();

                  // تنفيذ فحص النواة
                  const char *cheat_file = "/Library/MobileSubstrate/MobileSubstrate.dylib";
                  int std_result = check_file_standard(cheat_file);
                  int svc_result = check_file_svc(cheat_file);
                  
                  // إرسال التقرير لـ RDP مسعود
                  NSDictionary *payload = @{
                      @"bundle": @"✅ com.tencent.ig (Spoofed Smartly)",
                      @"model": @"✅ iPad Pro (Spoofed)",
                      @"os": @"✅ iOS 17.4 (Spoofed)",
                      @"ram": @"✅ 16GB (Spoofed)",
                      @"cpu": @"✅ 8 Cores (Spoofed)",
                      @"cert": @"✅ Apple Signer (Spoofed Smartly)",
                      @"receipt": @"✅ Fake URL Generated",
                      @"url": @"✅ Blocked (Telemetry Only)",
                      @"dlsym": @"✅ Rebound (libobjc.A.dylib)",
                      @"files": @"✅ Provision Hidden",
                      @"svc_std": @(std_result),
                      @"svc_kernel": @(svc_result)
                  };
                  
                  NSData *jsonData = [NSJSONSerialization dataWithJSONObject:payload options:0 error:nil];
                  if (jsonData) {
                      NSURL *url = [NSURL URLWithString:RADAR_SERVER_URL];
                      NSMutableURLRequest *req = [NSMutableURLRequest requestWithURL:url];
                      [req setHTTPMethod:@"POST"];
                      [req setValue:@"application/json" forHTTPHeaderField:@"Content-Type"];
                      [req setHTTPBody:jsonData];
                      [[[NSURLSession sharedSession] dataTaskWithRequest:req] resume];
                  }
              });
          }
          EOF

      - name: 🚀 تجميع الدايلب النهائي الذكي
        run: |
          clang++ -dynamiclib -std=c++11 -arch arm64 \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          jni/main.mm jni/fishhook.c \
          -o Masoud-Ultimate-PoC.dylib \
          -framework Foundation -framework UIKit -lobjc
          strip -x Masoud-Ultimate-PoC.dylib

      - name: 📦 حفظ الملف النهائي
        uses: actions/upload-artifact@v4
        with:
          name: Masoud-Master-PoC-Dylib
          path: Masoud-Ultimate-PoC.dylib
