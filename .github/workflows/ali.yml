name: Imperial V-MAX - Mind Control Engine

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_mind_control:
    name: Compile Mind Control Dylib
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Obj-C Payload (Main.mm)
        run: |
          mkdir -p jni
          cat <<'EOF' > jni/main.mm
          #import <Foundation/Foundation.h>
          #import <objc/runtime.h>

          /**
           * ========================================================
           * 🛡️ MASOUD MIND CONTROL ENGINE (THE ULTIMATE BYPASS)
           * 🎯 CAPABILITY 1: JSON Config Hijacking (Disable Anti-Cheat)
           * 🎯 CAPABILITY 2: Fake Network Responses (Swallow Reports with 200 OK)
           * 🚫 ZERO C-HOOKS. ZERO FISHHOOK. 100% UNDETECTABLE.
           * ========================================================
           */

          // دالة مساعدة للتبديل الآمن (Swizzling)
          void SafeSwizzle(Class c, SEL orig, IMP newImp, IMP* oldImp) {
              Method m = class_getInstanceMethod(c, orig);
              if (!m) m = class_getClassMethod(c, orig);
              if (m) { *oldImp = method_getImplementation(m); method_setImplementation(m, newImp); }
          }

          // ==========================================
          // 🧠 1. غسيل الدماغ (اختراق أوامر السيرفر JSON)
          // ==========================================
          static id (*orig_JSONObjectWithData)(Class, SEL, NSData *, NSJSONReadingOptions, NSError **);

          id hk_JSONObjectWithData(Class self, SEL _cmd, NSData *data, NSJSONReadingOptions opt, NSError **err) {
              id result = orig_JSONObjectWithData(self, _cmd, data, opt, err);

              @try {
                  if ([result isKindOfClass:[NSDictionary class]]) {
                      NSDictionary *dict = (NSDictionary *)result;

                      // هل هذا ملف getconfig الخاص بالحماية؟
                      if (dict[@"biz_data"] && dict[@"biz_data"][@"merged_cfg"]) {
                          
                          // إعادة تحويل البيانات إلى صيغة قابلة للتعديل
                          NSData *rawDictData = [NSJSONSerialization dataWithJSONObject:dict options:0 error:nil];
                          NSMutableDictionary *mDict = [NSJSONSerialization JSONObjectWithData:rawDictData options:NSJSONReadingMutableContainers error:nil];

                          if (mDict && mDict[@"biz_data"] && mDict[@"biz_data"][@"merged_cfg"]) {
                              NSMutableDictionary *mergedCfg = mDict[@"biz_data"][@"merged_cfg"];

                              // تدمير أوامر التجسس من السيرفر!
                              for (NSString *key in [mergedCfg allKeys]) {
                                  if ([mergedCfg[key] isKindOfClass:[NSMutableDictionary class]]) {
                                      NSMutableDictionary *innerDict = mergedCfg[key];
                                      if (innerDict[@"GEnableUploadStatInfo"]) innerDict[@"GEnableUploadStatInfo"] = @"false";
                                      if (innerDict[@"XPCallReportCrashKitBattle"]) innerDict[@"XPCallReportCrashKitBattle"] = @"false";
                                      if (innerDict[@"USFSKickoutPkgName"]) innerDict[@"USFSKickoutPkgName"] = @"";
                                  }
                              }

                              // تدمير فحص الهاردوير
                              if (mDict[@"GEM"] && [mDict[@"GEM"] isKindOfClass:[NSMutableDictionary class]]) {
                                  NSMutableDictionary *gemDict = mDict[@"GEM"];
                                  gemDict[@"cpu"] = @"0"; gemDict[@"battery"] = @"0";
                              }

                              NSLog(@"[MASOUD LAB] 🎯 JSON Commands Hijacked!");
                              return mDict; 
                          }
                      }
                  }
              } @catch (NSException *e) {}
              return result;
          }

          // ==========================================
          // 🌐 2. الردود الوهمية (ابتلاع تقارير الباند وإرجاع "نجاح")
          // ==========================================
          static NSURLSessionDataTask* (*orig_dataTaskWithRequest)(id, SEL, NSURLRequest*, id);

          NSURLSessionDataTask* hk_dataTaskWithRequest(id self, SEL _cmd, NSURLRequest* request, void (^completionHandler)(NSData*, NSURLResponse*, NSError*)) {
              
              if (request && request.URL) {
                  NSString *urlStr = request.URL.absoluteString.lowercaseString;
                  
                  // 🔥 السحر هنا: إذا اللعبة تحاول إرسال تقرير باند (Telemetry/CrashSight)
                  if ([urlStr containsString:@"tdatamaster"] || [urlStr containsString:@"crashsight"] || [urlStr containsString:@"anogs"]) {
                      
                      NSLog(@"[MASOUD LAB] 🛡️ Swallowing Cheat Report to: %@", urlStr);
                      
                      // 1. لا نقوم بإنشاء اتصال حقيقي نهائياً (نقطع الواير)
                      // 2. نقوم بإنشاء "رد وهمي" (Fake Response) نخبر فيه اللعبة أن الاتصال نجح 100%!
                      if (completionHandler) {
                          NSHTTPURLResponse *fakeResponse = [[NSHTTPURLResponse alloc] initWithURL:request.URL 
                                                                                        statusCode:200 // 200 تعني OK (نجاح)
                                                                                       HTTPVersion:@"HTTP/1.1" 
                                                                                      headerFields:nil];
                          // استدعاء دالة الإكمال الوهمية وإعطائها بيانات فارغة بنجاح
                          dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0), ^{
                              completionHandler([NSData data], fakeResponse, nil);
                          });
                      }
                      // نرجع Task وهمي لمنع الكراش
                      return nil; 
                  }
              }
              // السماح للروابط السليمة بالمرور (مثل تسجيل الدخول واللعب)
              return orig_dataTaskWithRequest(self, _cmd, request, completionHandler);
          }

          // ==========================================
          // 🚀 التشغيل الصامت والآمن
          // ==========================================
          __attribute__((constructor))
          static void start_mind_control() {
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 2 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  
                  // 1. تفعيل غسيل الدماغ للـ JSON
                  Method m_json = class_getClassMethod([NSJSONSerialization class], @selector(JSONObjectWithData:options:error:));
                  orig_JSONObjectWithData = (id (*)(Class, SEL, NSData *, NSJSONReadingOptions, NSError **))method_getImplementation(m_json);
                  method_setImplementation(m_json, (IMP)hk_JSONObjectWithData);

                  // 2. تفعيل الردود الوهمية لابتلاع تقارير الباند
                  SafeSwizzle([NSURLSession class], @selector(dataTaskWithRequest:completionHandler:), (IMP)hk_dataTaskWithRequest, (IMP*)&orig_dataTaskWithRequest);
                  
                  NSLog(@"[MASOUD LAB] 🦅 MIND CONTROL ENGINE DEPLOYED. TENCENT IS NOW YOUR PUPPET.");
              });
          }
          EOF

      - name: Compile Mind Control Engine
        run: |
          clang++ -dynamiclib -std=c++11 -arch arm64 \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          jni/main.mm -o Masoud-Mind-Control.dylib \
          -framework Foundation -lobjc
          strip -x Masoud-Mind-Control.dylib

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Masoud-Mind-Control
          path: Masoud-Mind-Control.dylib
