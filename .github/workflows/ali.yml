name: Imperial V-MAX - anogs Runtime Patcher

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_patcher:
    name: Compile anogs Live Memory Patcher
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate C++ Payload (Main.mm)
        run: |
          cat <<'EOF' > main.mm
          #import <Foundation/Foundation.h>
          #import <mach-o/dyld.h>
          #import <mach/mach.h>
          #import <sys/mman.h>
          #import <libkern/OSCacheControl.h>

          /**
           * ========================================================
           * 🛡️ MASOUD SECURITY LAB - RUNTIME MEMORY PATCHER
           * 🎯 TARGET: anogs.dylib
           * ⚙️ ACTION: Safely blind the Integrity Checker at 0x459C
           * ========================================================
           */

          // 1. تعريف البايتات السحرية (MOV X0, #0) في معمارية ARM64
          // هذا الكود يخبر المعالج بإرجاع قيمة "صفر" بدون التسبب في كراش
          uint8_t safe_patch_bytes[] = {0x00, 0x00, 0x80, 0xD2};

          // 2. دالة كسر حماية الذاكرة وزرع البايتات
          void PatchMemory(uintptr_t address, uint8_t* patch_data, size_t length) {
              // حساب بداية الصفحة في الذاكرة (ضروري لنظام iOS)
              uintptr_t page_start = address & ~(PAGE_SIZE - 1);
              
              // أ: إزالة الحماية وجعل الذاكرة قابلة للقراءة والكتابة والتنفيذ (RWX)
              mprotect((void*)page_start, PAGE_SIZE, PROT_READ | PROT_WRITE | PROT_EXEC);
              
              // ب: زرع البايتات الجديدة فوق القديمة
              memcpy((void*)address, patch_data, length);
              
              // ج: تنظيف ذاكرة التخزين المؤقت للمعالج (Instruction Cache)
              // استخدام دالة أبل الرسمية لمنع أخطاء التجميع والكراش
              sys_icache_invalidate((void*)address, length);
              
              // د: إعادة الحماية للذاكرة (قراءة وتنفيذ فقط RX) لإخفاء الأثر
              mprotect((void*)page_start, PAGE_SIZE, PROT_READ | PROT_EXEC);
          }

          // 3. دالة البحث عن anogs وتطبيق الباتش
          void ExecuteAnogsPatch() {
              for (uint32_t i = 0; i < _dyld_image_count(); i++) {
                  const char* image_name = _dyld_get_image_name(i);
                  
                  if (strstr(image_name, "anogs")) {
                      // الحصول على العنوان الأساسي للملف في الذاكرة (Base Address)
                      uintptr_t base_addr = (uintptr_t)_dyld_get_image_header(i);
                      
                      // الأوفست الذهبي الذي اكتشفه مسعود
                      uintptr_t target_offset = 0x459C;
                      
                      // حساب العنوان الفعلي في الذاكرة
                      uintptr_t effective_address = base_addr + target_offset;
                      
                      // تنفيذ عملية الزرع
                      PatchMemory(effective_address, safe_patch_bytes, sizeof(safe_patch_bytes));
                      
                      NSLog(@"[MASOUD LAB] 🦅 BOOM! anogs integrity check blinded at 0x%lx", effective_address);
                      return; // الخروج بعد نجاح العملية
                  }
              }
          }

          // 4. خيط مراقبة يعمل في الخلفية لانتظار تحميل anogs
          void StartMemorySniper() {
              dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_HIGH, 0), ^{
                  bool isPatched = false;
                  // حلقة تكرارية تفحص الذاكرة كل ثانية
                  while(!isPatched) {
                      for (uint32_t i = 0; i < _dyld_image_count(); i++) {
                          if (strstr(_dyld_get_image_name(i), "anogs")) {
                              // إذا وجدنا الملف، ننتظر ثانية واحدة ليكتمل تحميله بالكامل
                              sleep(1); 
                              ExecuteAnogsPatch();
                              isPatched = true;
                              break;
                          }
                      }
                      if (!isPatched) {
                          sleep(1); // إذا لم نجده، انتظر ثانية وحاول مرة أخرى
                      }
                  }
              });
          }

          // نقطة البداية (تعمل تلقائياً عند حقن الدايلب)
          __attribute__((constructor))
          static void init_patcher() {
              NSLog(@"[MASOUD LAB] 🛡️ Live Memory Patcher Initialized. Waiting for target...");
              StartMemorySniper();
          }
          EOF

      - name: Compile Dylib
        run: |
          clang++ -dynamiclib -std=c++11 -arch arm64 \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          main.mm -o Masoud-Live-Patcher.dylib \
          -framework Foundation
          strip -x Masoud-Live-Patcher.dylib

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Masoud-Live-Patcher
          path: Masoud-Live-Patcher.dylib
