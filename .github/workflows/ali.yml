name: Shammari VIP IPA Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir jni
          cat <<'EOF' > jni/main.mm
          #import <Foundation/Foundation.h>
          #import <UIKit/UIKit.h>
          #import <mach-o/dyld.h>
          #import <sys/mman.h>
          #import <objc/runtime.h>
          #include <vector>

          volatile const char* MASOUD_MARK = "SHAMMARI_MASTER_PROTECTION_2026";
          uint8_t XOR_KEY = 0x6A;
          uint32_t KILL_HEX[] = {0xD2800000, 0xD65F03C0}; 

          NSString* GetDecryptedURL() {
              uint8_t enc[] = { 0x02, 0x1E, 0x1E, 0x1A, 0x50, 0x45, 0x45, 0x1A, 0x1F, 0x08, 0x0D, 0x44, 0x07, 0x13, 0x1C, 0x04, 0x09, 0x44, 0x09, 0x05, 0x07, 0x45, 0x1A, 0x1F, 0x08, 0x0D, 0x44, 0x1A, 0x02, 0x1A, 0x55, 0x0B, 0x1A, 0x03, 0x57, 0x5B };
              NSMutableString *s = [NSMutableString string];
              for(int i=0; i<sizeof(enc); i++) [s appendFormat:@"%c", enc[i] ^ XOR_KEY];
              return s;
          }

          uint8_t VerifyMasoudCore() {
              uint32_t c = 0; for(int i=0; MASOUD_MARK[i]!='\0'; i++) c += MASOUD_MARK[i];
              return ((c % 256) == 12) ? XOR_KEY : 0x00;
          }

          @interface FalconEyeUI : NSObject
          + (instancetype)shared;
          @property (nonatomic, strong) UIView *blackOverlay;
          @property (nonatomic, strong) UIView *loginBox;
          @property (nonatomic, strong) UIView *statusContainer;
          @property (nonatomic, strong) UIView *lampConn;
          @property (nonatomic, strong) UIView *lampSec;
          @property (nonatomic, strong) UILabel *lblSec;
          @property (nonatomic, strong) UIView *maintenanceView; // شاشة التجميد
          @end

          @implementation FalconEyeUI
          + (instancetype)shared {
              static FalconEyeUI *i; static dispatch_once_t o;
              dispatch_once(&o, ^{ i = [[FalconEyeUI alloc] init]; }); return i;
          }

          - (void)drawLogin {
              UIWindow *w = [UIApplication sharedApplication].keyWindow;
              if(!w) return;

              self.blackOverlay = [[UIView alloc] initWithFrame:w.bounds];
              self.blackOverlay.backgroundColor = [UIColor colorWithWhite:0 alpha:0.9];
              [w addSubview:self.blackOverlay];

              self.loginBox = [[UIView alloc] initWithFrame:CGRectMake(w.bounds.size.width/2-140, w.bounds.size.height/2-100, 280, 200)];
              self.loginBox.backgroundColor = [UIColor colorWithRed:0.05 green:0.05 blue:0.1 alpha:1.0];
              self.loginBox.layer.cornerRadius = 20;
              self.loginBox.layer.borderColor = [UIColor cyanColor].CGColor;
              self.loginBox.layer.borderWidth = 1;
              [self.blackOverlay addSubview:self.loginBox];

              UILabel *title = [[UILabel alloc] initWithFrame:CGRectMake(0, 20, 280, 30)];
              title.text = @"🦅 محمد الشمري VIP";
              title.textColor = [UIColor whiteColor];
              title.textAlignment = NSTextAlignmentCenter;
              title.font = [UIFont boldSystemFontOfSize:18];
              [self.loginBox addSubview:title];

              UIButton *btn = [UIButton buttonWithType:UIButtonTypeSystem];
              btn.frame = CGRectMake(40, 120, 200, 45);
              btn.backgroundColor = [UIColor systemBlueColor];
              [btn setTitle:@"تفعيل الحماية" forState:UIControlStateNormal];
              [btn setTitleColor:[UIColor whiteColor] forState:UIControlStateNormal];
              btn.layer.cornerRadius = 10;
              [btn addTarget:self action:@selector(handleLogin) forControlEvents:UIControlEventTouchUpInside];
              [self.loginBox addSubview:btn];
          }

          - (void)handleLogin {
              UIView *l = [[UIView alloc] initWithFrame:self.loginBox.bounds];
              l.backgroundColor = [UIColor blackColor];
              l.layer.cornerRadius = 20;
              UIActivityIndicatorView *act = [[UIActivityIndicatorView alloc] initWithActivityIndicatorStyle:UIActivityIndicatorViewStyleWhiteLarge];
              act.center = CGPointMake(140, 100);
              [act startAnimating];
              [l addSubview:act];
              [self.loginBox addSubview:l];

              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 3 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  [UIView animateWithDuration:0.5 animations:^{ self.blackOverlay.alpha = 0; } completion:^(BOOL f){
                      [self.blackOverlay removeFromSuperview];
                      [self showBanner];
                  }];
              });
          }

          - (void)showBanner {
              UIWindow *w = [UIApplication sharedApplication].keyWindow;
              UIView *b = [[UIView alloc] initWithFrame:CGRectMake(0, -60, w.bounds.size.width, 60)];
              b.backgroundColor = [UIColor colorWithRed:0.2 green:0.1 blue:0.5 alpha:0.9];
              UILabel *t = [[UILabel alloc] initWithFrame:b.bounds];
              t.text = @"🦅 تم تفعيل حماية الشمري بنجاح ✅";
              t.textColor = [UIColor whiteColor]; t.textAlignment = NSTextAlignmentCenter;
              t.font = [UIFont boldSystemFontOfSize:14];
              [b addSubview:t]; [w addSubview:b];

              [UIView animateWithDuration:0.5 animations:^{ b.frame = CGRectMake(0, 40, w.bounds.size.width, 60); } completion:^(BOOL f){
                  dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 3 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                      [UIView animateWithDuration:0.5 animations:^{ b.frame = CGRectMake(0, -60, w.bounds.size.width, 60); } completion:^(BOOL f){
                          [b removeFromSuperview];
                          [self drawLamps:w];
                      }];
                  });
              }];
          }

          - (void)showAnogsKilledBanner {
              dispatch_async(dispatch_get_main_queue(), ^{
                  UIWindow *w = [UIApplication sharedApplication].keyWindow;
                  UIView *b = [[UIView alloc] initWithFrame:CGRectMake(0, -60, w.bounds.size.width, 60)];
                  b.backgroundColor = [UIColor colorWithRed:0.7 green:0.0 blue:0.1 alpha:0.95]; 
                  b.layer.borderWidth = 1;
                  b.layer.borderColor = [UIColor redColor].CGColor;
        
                  UILabel *t = [[UILabel alloc] initWithFrame:b.bounds];
                  t.text = @"☠️ تم إعدام وتجميد جاسوس anogs بنجاح!";
                  t.textColor = [UIColor whiteColor]; 
                  t.textAlignment = NSTextAlignmentCenter;
                  t.font = [UIFont boldSystemFontOfSize:14];
                  [b addSubview:t]; [w addSubview:b];

                  [UIView animateWithDuration:0.5 animations:^{ b.frame = CGRectMake(0, 40, w.bounds.size.width, 60); } completion:^(BOOL f){
                      dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 4 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                          [UIView animateWithDuration:0.5 animations:^{ b.frame = CGRectMake(0, -60, w.bounds.size.width, 60); } completion:^(BOOL f){
                              [b removeFromSuperview];
                          }];
                      });
                  }];
              });
          }

          - (void)drawLamps:(UIWindow*)w {
              self.statusContainer = [[UIView alloc] initWithFrame:CGRectMake(w.bounds.size.width/2-90, 10, 180, 25)];
              self.statusContainer.backgroundColor = [UIColor colorWithWhite:0 alpha:0.4];
              self.statusContainer.layer.cornerRadius = 12;
    
              self.lampConn = [[UIView alloc] initWithFrame:CGRectMake(10, 7, 10, 10)];
              self.lampConn.layer.cornerRadius = 5; self.lampConn.backgroundColor = [UIColor redColor];
              [self.statusContainer addSubview:self.lampConn];
    
              self.lampSec = [[UIView alloc] initWithFrame:CGRectMake(90, 7, 10, 10)];
              self.lampSec.layer.cornerRadius = 5; self.lampSec.backgroundColor = [UIColor grayColor];
              [self.statusContainer addSubview:self.lampSec];
    
              self.lblSec = [[UILabel alloc] initWithFrame:CGRectMake(105, 0, 70, 25)];
              self.lblSec.text = @"Safe Mode"; self.lblSec.textColor = [UIColor whiteColor];
              self.lblSec.font = [UIFont boldSystemFontOfSize:9];
              [self.statusContainer addSubview:self.lblSec];
    
              [w addSubview:self.statusContainer];
              [self startSync];
          }

          - (void)startSync {
              [NSTimer scheduledTimerWithTimeInterval:4.0 repeats:YES block:^(NSTimer *t) {
                  // جلب معلومات الجهاز للوحة
                  NSString *udid = [[[UIDevice currentDevice] identifierForVendor] UUIDString];
                  NSString *dev = [[UIDevice currentDevice] model];
                  NSString *encodedDev = [dev stringByAddingPercentEncodingWithAllowedCharacters:[NSCharacterSet URLQueryAllowedCharacterSet]];
        
                  NSString *fullUrlStr = [NSString stringWithFormat:@"%@&udid=%@&device=%@", GetDecryptedURL(), udid, encodedDev];
                  NSURL *u = [NSURL URLWithString:fullUrlStr];
        
                  [[[NSURLSession sharedSession] dataTaskWithURL:u completionHandler:^(NSData *d, NSURLResponse *r, NSError *e) {
                      dispatch_async(dispatch_get_main_queue(), ^{
                          if(e || !d) { self.lampConn.backgroundColor = [UIColor redColor]; return; }
                          self.lampConn.backgroundColor = [UIColor greenColor];
                          NSDictionary *j = [NSJSONSerialization JSONObjectWithData:d options:0 error:nil];
                          if(j) {
                              // 1. نظام الحظر (Ban) والكراش الإجباري
                              if([j[@"banned"] boolValue] == YES || [j[@"status"] isEqualToString:@"crash"]) exit(0);
                    
                              // 2. نظام اللمبات
                              if([j[@"security"] isEqualToString:@"safe"]) {
                                  self.lampSec.backgroundColor = [UIColor greenColor]; self.lblSec.text = @"Safe 🟢";
                              } else {
                                  self.lampSec.backgroundColor = [UIColor redColor]; self.lblSec.text = @"Danger 🔴";
                              }
                    
                              // 3. نظام التجميد وإلغاء التجميد الديناميكي
                              if([j[@"status"] isEqualToString:@"maintenance"]) {
                                  if (!self.maintenanceView) {
                                      self.maintenanceView = [[UIView alloc] initWithFrame:[UIScreen mainScreen].bounds];
                                      self.maintenanceView.backgroundColor = [UIColor blackColor];
                                      UILabel *mt = [[UILabel alloc] initWithFrame:self.maintenanceView.bounds];
                                      mt.text = @"🚧 اللعبة تحت الصيانة بواسطة الإدارة"; 
                                      mt.textColor = [UIColor yellowColor]; 
                                      mt.font = [UIFont boldSystemFontOfSize:20];
                                      mt.textAlignment = NSTextAlignmentCenter;
                                      [self.maintenanceView addSubview:mt]; 
                                      [[UIApplication sharedApplication].keyWindow addSubview:self.maintenanceView];
                                  }
                              } else {
                                  // إذا الإدارة ألغت التجميد، نرفع الشاشة السوداء!
                                  if (self.maintenanceView) {
                                      [self.maintenanceView removeFromSuperview];
                                      self.maintenanceView = nil;
                                  }
                              }
                          }
                      });
                  }] resume];
              }];
          }
          @end

          void ApplyPatch(uintptr_t addr) {
              if(!addr) return;
              size_t ps = getpagesize(); uintptr_t start = addr & ~(ps-1);
              mprotect((void*)start, ps, PROT_READ|PROT_WRITE|PROT_EXEC);
              memcpy((void*)addr, KILL_HEX, 8); 
              mprotect((void*)start, ps, PROT_READ|PROT_EXEC);
          }

          uintptr_t ScanMemory(uint8_t* b, size_t s, std::vector<int> p) {
              for(size_t i=0; i<s-p.size(); i++) {
                  bool f=true;
                  for(size_t j=0; j<p.size(); j++) if(b[i+j]!=p[j] && p[j]!=-1) {f=false; break;}
                  if(f) return (uintptr_t)(b+i);
              }
              return 0;
          }

