name: Imperial V-MAX - Multi-Module Sniper (Shadow + Anogs)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_hybrid_sniper:
    name: Compile Multi-Module Sniper Dylib
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate C++ Payload (Main.mm)
        run: |
          mkdir -p jni
          cat <<'EOF' > jni/main.mm
          #import <Foundation/Foundation.h>
          #import <mach-o/dyld.h>
          #import <mach/mach.h>
          #import <sys/mman.h>
          #import <libkern/OSCacheControl.h>
          #import <signal.h>

          /**
           * ========================================================
           * 🛡️ MASOUD MULTI-MODULE SNIPER (V-MAX)
           * 🎯 TARGET 1: anogs.dylib (Offset 0x459C) via HWBP
           * 🎯 TARGET 2: ShadowTrackerExtra (6 Offsets) via Runtime Patch
           * ========================================================
           */

          static uintptr_t g_anogs_target = 0;
          uint8_t op_mov_x0_0[] = {0x00, 0x00, 0x80, 0xD2}; // MOV X0, #0

          // ==========================================
          // 🛠️ محرك تعديل الذاكرة (لأوفستات الشادو)
          // ==========================================
          void PatchMem(uintptr_t addr) {
              if (addr == 0) return;
              uintptr_t page_start = addr & ~(PAGE_SIZE - 1);
              mprotect((void*)page_start, PAGE_SIZE, PROT_READ | PROT_WRITE | PROT_EXEC);
              memcpy((void*)addr, op_mov_x0_0, 4);
              sys_icache_invalidate((void*)addr, 4);
              mprotect((void*)page_start, PAGE_SIZE, PROT_READ | PROT_EXEC);
          }

          // ==========================================
          // 🧠 مصيدة المعالج (للأوفست الذهبي 0x459C)
          // ==========================================
          void hw_trap_handler(int signum, siginfo_t *info, void *context) {
              ucontext_t *uc = (ucontext_t *)context;
              _STRUCT_ARM_THREAD_STATE64 *ss = &uc->uc_mcontext->__ss;

              if (ss->__pc == g_anogs_target) {
                  ss->__x[0] = 0; // تصفير النتيجة
                  ss->__pc += 4;  // تخطي التعليمة
              }
          }

          void ApplyHWBP(uintptr_t target) {
              struct sigaction sa;
              sa.sa_sigaction = hw_trap_handler;
              sa.sa_flags = SA_SIGINFO;
              sigemptyset(&sa.sa_mask);
              sigaction(SIGTRAP, &sa, NULL);

              thread_act_array_t threads;
              mach_msg_type_number_t count;
              if (task_threads(mach_task_self(), &threads, &count) != KERN_SUCCESS) return;

              for (int i = 0; i < count; i++) {
                  arm_debug_state64_t dbg;
                  mach_msg_type_number_t dbg_count = ARM_DEBUG_STATE64_COUNT;
                  if (thread_get_state(threads[i], ARM_DEBUG_STATE64, (thread_state_t)&dbg, &dbg_count) == KERN_SUCCESS) {
                      dbg.__bvr[0] = target;
                      dbg.__bcr[0] = 0x1E5; 
                      thread_set_state(threads[i], ARM_DEBUG_STATE64, (thread_state_t)&dbg, ARM_DEBUG_STATE64_COUNT);
                  }
              }
          }

          // ==========================================
          // 🚀 المحرك المركزي (مراقبة التحميل)
          // ==========================================
          void StartSniper() {
              dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_HIGH, 0), ^{
                  bool anogs_done = false;
                  bool shadow_done = false;

                  while (!anogs_done || !shadow_done) {
                      for (uint32_t i = 0; i < _dyld_image_count(); i++) {
                          const char* name = _dyld_get_image_name(i);
                          uintptr_t base = (uintptr_t)_dyld_get_image_header(i);

                          // 1. معالجة ملف الحماية (anogs) بالسجلات
                          if (!anogs_done && strstr(name, "anogs")) {
                              g_anogs_target = base + 0x459C;
                              sleep(1);
                              ApplyHWBP(g_anogs_target);
                              anogs_done = true;
                              NSLog(@"[MASOUD] 🎯 ANOGS SNIPER ACTIVE AT 0x459C");
                          }

                          // 2. معالجة ملف اللعبة (Shadow) بالباتش المباشر
                          if (!shadow_done && strstr(name, "ShadowTrackerExtra")) {
                              sleep(2); // انتظار اكتمال فك تشفير اللعبة
                              
                              // حقن الأوفستات الـ 6 اللي عطيتني إياها يا ذيب
                              PatchMem(base + 0x382AA78);
                              PatchMem(base + 0x38B655C);
                              PatchMem(base + 0x3D87E24);
                              PatchMem(base + 0x384C5CC);
                              PatchMem(base + 0x4B460FC);
                              PatchMem(base + 0x381C640);

                              shadow_done = true;
                              NSLog(@"[MASOUD] 🛡️ SHADOW 6-POINT ARMOR DEPLOYED!");
                          }
                      }
                      sleep(1);
                  }
              });
          }

          __attribute__((constructor))
          static void init() {
              NSLog(@"[MASOUD LAB] 🦅 HYBRID SNIPER INITIALIZED!");
              StartSniper();
          }
          EOF

      - name: Compile Sniper
        run: |
          clang++ -dynamiclib -std=c++11 -arch arm64 \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          jni/main.mm -o Masoud-Hybrid-Sniper.dylib \
          -framework Foundation
          strip -x Masoud-Hybrid-Sniper.dylib

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Masoud-Hybrid-Sniper
          path: Masoud-Hybrid-Sniper.dylib
