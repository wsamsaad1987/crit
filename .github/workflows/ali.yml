              if (isBlockedAnogs()) return NULL;
              return orig_fopen(GetRedirectedPath(filename), mode);
          }

          int hk_access(const char *path, int amode) {
              if (isBlockedAnogs()) return -1;
              return orig_access(GetRedirectedPath(path), amode);
          }

          int hk_open(const char *path, int oflag, ...) {
              if (isBlockedAnogs()) return -1;
              const char* redirected = GetRedirectedPath(path);
              va_list args; va_start(args, oflag);
              mode_t mode = va_arg(args, int); va_end(args);
              return orig_open(redirected, oflag, mode);
          }

          int hk_stat(const char *path, struct stat *buf) {
              if (isBlockedAnogs()) return -1;
              return orig_stat(GetRedirectedPath(path), buf);
          }

          // ==========================================
          // 🚀 نقطة الانطلاق الشاملة (التأخير الزمني 30 ثانية)
          // ==========================================
          __attribute__((constructor))
          static void bk_init_safe() {
              // 1. تفعيل الواجهة والهوكات فوراً (ستعمل كـ Pass-Through مبدئياً)
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 2 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  [[FalconEyeUI shared] drawLogin];
        
                  SafeSwizzle([NSFileManager class], @selector(fileExistsAtPath:), (IMP)hk_fileExistsAtPath, (IMP*)&orig_fileExistsAtPath);
                  SafeSwizzle([NSBundle class], @selector(infoDictionary), (IMP)hk_infoDict, (IMP*)&orig_infoDict);
                  method_setImplementation(class_getInstanceMethod([NSBundle class], @selector(appStoreReceiptURL)), 
                      imp_implementationWithBlock(^NSURL* (id self) {
                          return [NSURL fileURLWithPath:@"/System/Library/PrivateFrameworks/StoreServices.framework/receipt"];
                      }));
            
                  struct rebinding hooks[] = {
                      {"_dyld_get_image_name", (void *)hk_dyld_get_image_name, (void **)&orig_dyld_get_image_name},
                      {"dlsym", (void *)hk_dlsym, (void **)&orig_dlsym},
                      {"sysctlbyname", (void *)hk_sysctlbyname, (void **)&orig_sysctlbyname},
                      {"fopen", (void *)hk_fopen, (void **)&orig_fopen},
                      {"open", (void *)hk_open, (void **)&orig_open},
                      {"access", (void *)hk_access, (void **)&orig_access},
                      {"stat", (void *)hk_stat, (void **)&orig_stat}
                  };
                  rebind_symbols(hooks, 7);
              });

              // 2. ⏳ مفتاح الأمان الزمني (تفعيل التوجيه بعد 30 ثانية لضمان عبور الطيارة واللوبي)
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 30 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  g_is_engine_stable = true;
                  NSLog(@"[MASOUD LAB] ⏳ 30 Seconds Passed! Precision File Redirector is now ACTIVE.");
              });
          }

