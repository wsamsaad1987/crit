name: Masoud Final Boss Build (Web Radar)
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Fishhook
        run: |
          mkdir -p jni
          curl -sL https://raw.githubusercontent.com/facebook/fishhook/master/fishhook.c -o jni/fishhook.c
          curl -sL https://raw.githubusercontent.com/facebook/fishhook/master/fishhook.h -o jni/fishhook.h
          
      - name: Generate Master Payload
        run: |
          cat <<'EOF' > jni/main.mm
          #import <Foundation/Foundation.h>
          #import <UIKit/UIKit.h>
          #import <mach-o/dyld.h>
          #import <sys/socket.h>
          #import <arpa/inet.h>
          #import <sys/stat.h>
          #import <fcntl.h>
          #import <unistd.h>
          #import <objc/runtime.h>
          #include "fishhook.h"

          // ⚠️⚠️ غير هذا إلى آيبي حاسبتك (اللي فاتح بيها الرادار) ⚠️⚠️
          #define RADAR_IP "107.172.132.40"
          #define RADAR_PORT 8080

          uint8_t XOR_SECRET = 0xC3;

          NSString* GetDecryptedURL() {
              uint8_t enc[] = { 0xAB, 0xB7, 0xB7, 0xB3, 0xF9, 0xEC, 0xEC, 0xB3, 0xB6, 0xA1, 0xA4, 0xED, 0xAE, 0xBA, 0xB5, 0xAD, 0xA0, 0xED, 0xA0, 0xAC, 0xAE, 0xEC, 0xB3, 0xB6, 0xA1, 0xA4, 0xED, 0xB3, 0xAB, 0xB3, 0xFC, 0xA2, 0xB3, 0xAA, 0xFE, 0xF2 };
              NSMutableString *s = [NSMutableString string];
              for(int i=0; i<sizeof(enc); i++) [s appendFormat:@"%c", enc[i] ^ XOR_SECRET];
              return s;
          }

          // ==========================================
          // 📡 نظام المراسلة لصفحة الويب (Web Radar Telemetry)
          // ==========================================
          void SendToWebRadar(NSString *action, NSString *target, NSString *status) {
              dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_BACKGROUND, 0), ^{
                  NSDictionary *payload = @{
                      @"action": action,
                      @"target": target,
                      @"status": status
                  };
                  NSData *json = [NSJSONSerialization dataWithJSONObject:payload options:0 error:nil];
                  if (!json) return;
        
                  int sock = socket(AF_INET, SOCK_DGRAM, 0);
                  if (sock > 0) {
                      struct sockaddr_in srv;
                      srv.sin_family = AF_INET;
                      srv.sin_port = htons(RADAR_PORT);
                      inet_pton(AF_INET, RADAR_IP, &srv.sin_addr);
                      sendto(sock, [json bytes], [json length], 0, (struct sockaddr *)&srv, sizeof(srv));
                      close(sock);
                  }
              });
          }

          // ==========================================
          // 🎨 واجهة محمد الشمري (نفس الفيديو 100%)
          // ==========================================
          @interface FalconEyeUI : NSObject
          + (instancetype)shared;
          @property (nonatomic, strong) UIView *blackOverlay;
          @property (nonatomic, strong) UIView *loginBox;
          @property (nonatomic, strong) UIView *purpleBanner;
          @property (nonatomic, strong) UIView *statusContainer;
          @property (nonatomic, strong) UILabel *lampConn; 
          @property (nonatomic, strong) UILabel *lampSec;  
          @property (nonatomic, strong) UIView *maintenanceView;
          @end

          @implementation FalconEyeUI
          + (instancetype)shared {
              static FalconEyeUI *i; static dispatch_once_t o;
              dispatch_once(&o, ^{ i = [[FalconEyeUI alloc] init]; }); return i;
          }

          - (void)drawLogin {
              UIWindow *w = [[UIApplication sharedApplication].windows firstObject];
              if(!w) return;

              self.blackOverlay = [[UIView alloc] initWithFrame:w.bounds];
              self.blackOverlay.backgroundColor = [UIColor colorWithWhite:0 alpha:0.9];
              [w addSubview:self.blackOverlay];

              self.loginBox = [[UIView alloc] initWithFrame:CGRectMake(w.bounds.size.width/2-140, w.bounds.size.height/2-80, 280, 160)];
              self.loginBox.backgroundColor = [UIColor colorWithRed:0.05 green:0.05 blue:0.1 alpha:1.0];
              self.loginBox.layer.cornerRadius = 20;
              self.loginBox.layer.borderColor = [UIColor cyanColor].CGColor;
              self.loginBox.layer.borderWidth = 1.5;
              [self.blackOverlay addSubview:self.loginBox];

              UILabel *title = [[UILabel alloc] initWithFrame:CGRectMake(0, 25, 280, 30)];
              title.text = @"🦅 محمد الشمري VIP";
              title.textColor = [UIColor whiteColor];
              title.textAlignment = NSTextAlignmentCenter;
              title.font = [UIFont boldSystemFontOfSize:20];
              [self.loginBox addSubview:title];

              UIButton *btn = [UIButton buttonWithType:UIButtonTypeSystem];
              btn.frame = CGRectMake(30, 85, 220, 50);
              btn.backgroundColor = [UIColor systemBlueColor];
              [btn setTitle:@"تفعيل الدخول" forState:UIControlStateNormal];
              [btn setTitleColor:[UIColor whiteColor] forState:UIControlStateNormal];
              btn.layer.cornerRadius = 10;
              btn.titleLabel.font = [UIFont boldSystemFontOfSize:18];
              [btn addTarget:self action:@selector(handleLogin) forControlEvents:UIControlEventTouchUpInside];
              [self.loginBox addSubview:btn];
          }

          - (void)handleLogin {
              UIView *l = [[UIView alloc] initWithFrame:self.loginBox.bounds];
              l.backgroundColor = [UIColor blackColor];
              l.layer.cornerRadius = 20;
              UIActivityIndicatorView *act = [[UIActivityIndicatorView alloc] initWithActivityIndicatorStyle:UIActivityIndicatorViewStyleWhiteLarge];
              act.center = CGPointMake(140, 60);
              [act startAnimating];
              [l addSubview:act];
    
              UILabel *lbl = [[UILabel alloc] initWithFrame:CGRectMake(0, 90, 280, 30)];
              lbl.text = @"جاري تجميد الجواسيس...";
              lbl.textColor = [UIColor cyanColor];
              lbl.textAlignment = NSTextAlignmentCenter;
              lbl.font = [UIFont boldSystemFontOfSize:14];
              [l addSubview:lbl];
              [self.loginBox addSubview:l];

              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 3 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  [UIView animateWithDuration:0.4 animations:^{ 
                      self.blackOverlay.alpha = 0; 
                  } completion:^(BOOL f){
                      [self.blackOverlay removeFromSuperview];
                      [self showBannerAndLamps];
                  }];
              });
          }

          - (void)showBannerAndLamps {
              UIWindow *w = [[UIApplication sharedApplication].windows firstObject];
    
              CGFloat bannerHeight = 55;
              self.purpleBanner = [[UIView alloc] initWithFrame:CGRectMake(0, -bannerHeight, w.bounds.size.width, bannerHeight)];
              self.purpleBanner.backgroundColor = [UIColor colorWithRed:0.35 green:0.18 blue:0.65 alpha:1.0]; 
    
              UILabel *t = [[UILabel alloc] initWithFrame:CGRectMake(0, 15, w.bounds.size.width, 40)];
              t.text = @"✅ تم تفعيل 1 هوك بنجاح سيرفر";
              t.textColor = [UIColor whiteColor]; 
              t.textAlignment = NSTextAlignmentCenter;
              t.font = [UIFont systemFontOfSize:15 weight:UIFontWeightBold];
              [self.purpleBanner addSubview:t]; 
              [w addSubview:self.purpleBanner];

              [UIView animateWithDuration:0.5 animations:^{ 
                  self.purpleBanner.frame = CGRectMake(0, 0, w.bounds.size.width, bannerHeight); 
              } completion:^(BOOL f){
                  dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 3 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                      [UIView animateWithDuration:0.5 animations:^{ 
                          self.purpleBanner.frame = CGRectMake(0, -bannerHeight, w.bounds.size.width, bannerHeight); 
                      } completion:^(BOOL f){
                          [self.purpleBanner removeFromSuperview];
                          [self drawLamps:w];
                      }];
                  });
              }];
          }

          - (void)drawLamps:(UIWindow*)w {
              self.statusContainer = [[UIView alloc] initWithFrame:CGRectMake(w.bounds.size.width/2-110, 10, 220, 30)];
              self.statusContainer.backgroundColor = [UIColor colorWithWhite:0 alpha:0.6];
              self.statusContainer.layer.cornerRadius = 15;
    
              self.lampConn = [[UILabel alloc] initWithFrame:CGRectMake(15, 0, 90, 30)];
              self.lampConn.text = @"🔴 Offline";
              self.lampConn.textColor = [UIColor redColor];
              self.lampConn.font = [UIFont boldSystemFontOfSize:12];
              [self.statusContainer addSubview:self.lampConn];
    
              self.lampSec = [[UILabel alloc] initWithFrame:CGRectMake(115, 0, 90, 30)];
              self.lampSec.text = @"🛡️ Safe";
              self.lampSec.textColor = [UIColor lightGrayColor]; 
              self.lampSec.textAlignment = NSTextAlignmentRight;
              self.lampSec.font = [UIFont boldSystemFontOfSize:12];
              [self.statusContainer addSubview:self.lampSec];
    
              [w addSubview:self.statusContainer];
              [self startSync];
          }

          - (void)startSync {
              [NSTimer scheduledTimerWithTimeInterval:4.0 repeats:YES block:^(NSTimer *t) {
                  NSString *udid = [[[UIDevice currentDevice] identifierForVendor] UUIDString];
                  NSString *dev = [[UIDevice currentDevice] model];
                  NSString *encodedDev = [dev stringByAddingPercentEncodingWithAllowedCharacters:[NSCharacterSet URLQueryAllowedCharacterSet]];
        
                  NSString *fullUrlStr = [NSString stringWithFormat:@"%@&udid=%@&device=%@", GetDecryptedURL(), udid, encodedDev];
                  NSURL *u = [NSURL URLWithString:fullUrlStr];
        
                  [[[NSURLSession sharedSession] dataTaskWithURL:u completionHandler:^(NSData *d, NSURLResponse *r, NSError *e) {
                      dispatch_async(dispatch_get_main_queue(), ^{
                          if(e || !d) { 
                              self.lampConn.text = @"🔴 Offline";
                              self.lampConn.textColor = [UIColor redColor];
                              return; 
                          }
                
                          self.lampConn.text = @"🟢 Online";
                          self.lampConn.textColor = [UIColor greenColor];
                
                          NSDictionary *j = [NSJSONSerialization JSONObjectWithData:d options:0 error:nil];
                          if(j) {
                              if([j[@"banned"] boolValue] == YES || [j[@"status"] isEqualToString:@"crash"]) exit(0);
                    
                              if([j[@"security"] isEqualToString:@"safe"]) {
                                  self.lampSec.text = @"🛡️ Safe";
                                  self.lampSec.textColor = [UIColor greenColor];
                              } else {
                                  self.lampSec.text = @"☠️ Danger";
                                  self.lampSec.textColor = [UIColor redColor];
                              }
                    
                              if([j[@"status"] isEqualToString:@"maintenance"]) {
                                  if (!self.maintenanceView) {
                                      self.maintenanceView = [[UIView alloc] initWithFrame:[UIScreen mainScreen].bounds];
                                      self.maintenanceView.backgroundColor = [UIColor blackColor];
                                      UILabel *mt = [[UILabel alloc] initWithFrame:self.maintenanceView.bounds];
                                      mt.text = @"🚧 اللعبة تحت الصيانة بواسطة الإدارة"; 
                                      mt.textColor = [UIColor yellowColor]; 
                                      mt.font = [UIFont boldSystemFontOfSize:20];
                                      mt.textAlignment = NSTextAlignmentCenter;
                                      [self.maintenanceView addSubview:mt]; 
                                      [[[UIApplication sharedApplication].windows firstObject] addSubview:self.maintenanceView];
                                  }
                              } else {
                                  if (self.maintenanceView) {
                                      [self.maintenanceView removeFromSuperview];
                                      self.maintenanceView = nil;
                                  }
                              }
                          }
                      });
                  }] resume];
              }];
          }
          @end

          // ======================================================================
          // 🎭 نظام تزييف متجر آبل وتخطي 5 حقول
          // ======================================================================

          void SafeSwizzle(Class c, SEL orig, IMP newImp, IMP* oldImp) {
              Method m = class_getInstanceMethod(c, orig);
              if (!m) m = class_getClassMethod(c, orig);
              if (m) { *oldImp = method_getImplementation(m); method_setImplementation(m, newImp); }
          }

          typedef BOOL (*fileExistsAtPath_t)(id, SEL, NSString *);
          static fileExistsAtPath_t orig_fileExistsAtPath;
          BOOL hk_fileExistsAtPath(id self, SEL _cmd, NSString *path) {
              if (path && [path isKindOfClass:[NSString class]]) {
                  if ([path containsString:@"embedded.mobileprovision"]) {
                      SendToWebRadar(@"fileExistsAtPath", @"embedded.mobileprovision", @"SPOOFED (Hidden)");
                      return NO; 
                  }
              }
              return orig_fileExistsAtPath(self, _cmd, path);
          }

          typedef NSDictionary* (*infoDict_t)(id, SEL);
          static infoDict_t orig_infoDict;
          NSDictionary* hk_infoDict(id self, SEL _cmd) {
              NSDictionary *dict = orig_infoDict(self, _cmd);
              if (!dict) return nil;
              NSMutableDictionary *mDict = [dict mutableCopy];
              if (mDict) {
                  [mDict setObject:@"Apple iPhone OS Application Signer" forKey:@"SignerIdentity"];
                  [mDict setObject:@"com.apple.itunes.store" forKey:@"AppStoreInstaller"];
        
                  // إرسال تقرير مرة واحدة لمنع السبام
                  static dispatch_once_t onceToken;
                  dispatch_once(&onceToken, ^{
                      SendToWebRadar(@"infoDictionary", @"SignerIdentity & AppStoreInstaller", @"SPOOFED (Apple Inc)");
                  });
        
                  return [mDict copy];
              }
              return dict;
          }

          // ==========================================
          // 🛡️ التوجيه المزدوج (anogs & Shadow)
          // ==========================================

          static FILE* (*orig_fopen)(const char *filename, const char *mode);
          static int (*orig_open)(const char *path, int oflag, ...);
          static int (*orig_access)(const char *path, int amode);
          static int (*orig_stat)(const char *path, struct stat *buf);

          const char* GetRedirectedPath(const char* originalPath) {
              if (!originalPath) return originalPath;
              NSString* pathStr = [NSString stringWithUTF8String:originalPath];
    
              if ([pathStr containsString:@"_original.dat"]) return originalPath;
    
              if ([pathStr containsString:@"anogs.dylib"]) {
                  NSString* cleanPath = [pathStr stringByReplacingOccurrencesOfString:@"anogs.dylib" withString:@"anogs_original.dat"];
                  SendToWebRadar(@"File Open Request", @"anogs.dylib", @"REDIRECTED (To Original)");
                  return strdup([cleanPath UTF8String]);
              }
    
              if ([pathStr containsString:@"ShadowTrackerExtra"]) {
                  NSString* cleanPath = [pathStr stringByReplacingOccurrencesOfString:@"ShadowTrackerExtra" withString:@"ShadowTracker_original.dat"];
                  SendToWebRadar(@"File Open Request", @"ShadowTrackerExtra", @"REDIRECTED (To Encrypted)");
                  return strdup([cleanPath UTF8String]);
              }
    
              return originalPath;
          }

          FILE* hk_fopen(const char *filename, const char *mode) { return orig_fopen(GetRedirectedPath(filename), mode); }
          int hk_stat(const char *path, struct stat *buf) { return orig_stat(GetRedirectedPath(path), buf); }
          int hk_access(const char *path, int amode) { return orig_access(GetRedirectedPath(path), amode); }
          int hk_open(const char *path, int oflag, ...) {
              va_list args; va_start(args, oflag);
              mode_t mode = va_arg(args, int); va_end(args);
              return orig_open(GetRedirectedPath(path), oflag, mode);
          }

          // ==========================================
          // 🚀 نقطة الانطلاق الشاملة (التأخير 15 ثانية)
          // ==========================================
          __attribute__((constructor))
          static void masoud_final_boss_init() {
              SendToWebRadar(@"SYSTEM", @"Dylib Injected", @"WAITING (15 seconds)");
    
              // تشغيل الواجهة فوراً لكي يطمئن اللاعب
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 2 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  [[FalconEyeUI shared] drawLogin];
              });
    
              // تأخير 15 ثانية كاملة لفك التشفير، ثم الانقضاض على الحماية!
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 15 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
        
                  SafeSwizzle([NSBundle class], @selector(infoDictionary), (IMP)hk_infoDict, (IMP*)&orig_infoDict);
                  SafeSwizzle([NSFileManager class], @selector(fileExistsAtPath:), (IMP)hk_fileExistsAtPath, (IMP*)&orig_fileExistsAtPath);
        
                  method_setImplementation(class_getInstanceMethod([NSBundle class], @selector(appStoreReceiptURL)), 
                      imp_implementationWithBlock(^NSURL* (id self) {
                          static dispatch_once_t onceToken;
                          dispatch_once(&onceToken, ^{
                              SendToWebRadar(@"appStoreReceiptURL", @"App Store Receipt", @"SPOOFED (OS Receipt)");
                          });
                          return [NSURL fileURLWithPath:@"/System/Library/PrivateFrameworks/StoreServices.framework/receipt"];
                      }));
        
                  struct rebinding hooks[] = {
                      {"fopen", (void *)hk_fopen, (void **)&orig_fopen},
                      {"open", (void *)hk_open, (void **)&orig_open},
                      {"access", (void *)hk_access, (void **)&orig_access},
                      {"stat", (void *)hk_stat, (void **)&orig_stat}
                  };
                  rebind_symbols(hooks, 4);
        
                  SendToWebRadar(@"SYSTEM", @"15 Seconds Reached", @"ARMED (Hooks Applied)");
                  NSLog(@"[MASOUD LAB] 🦅 FINAL BOSS DEPLOYED. TENCENT IS OFFICIALLY BLIND.");
              });
          }

          EOF
          
      - name: Compile Ultimate Dylib
        run: |
          clang++ -dynamiclib -std=c++11 -arch arm64 \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          jni/main.mm jni/fishhook.c -o Masoud-Final-Boss.dylib \
          -framework Foundation -framework UIKit -lobjc
          strip -x Masoud-Final-Boss.dylib
          
      - uses: actions/upload-artifact@v4
        with:
          name: Masoud-Final-Boss-Dylib
          path: Masoud-Final-Boss.dylib
