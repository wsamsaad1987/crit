name: Imperial V-MAX - anogs Offset Extractor

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_anogs_tracker:
    name: Build anogs Live Offset Tracker
    runs-on: macos-latest

    steps:
      - name: 📥 سحب الكود المصدري
        uses: actions/checkout@v4

      - name: 🎣 تحميل محرك Fishhook
        run: |
          mkdir -p jni
          curl -sL https://raw.githubusercontent.com/facebook/fishhook/master/fishhook.c -o jni/fishhook.c
          curl -sL https://raw.githubusercontent.com/facebook/fishhook/master/fishhook.h -o jni/fishhook.h

      - name: 🧪 توليد كود رادار استخراج الأوفست (Main.mm)
        run: |
          cat <<'EOF' > jni/main.mm
          #import <Foundation/Foundation.h>
          #import <unistd.h>
          #import <sys/stat.h>
          #import <fcntl.h>
          #import <sys/sysctl.h>
          #import <dlfcn.h>
          #include "fishhook.h"

          // ⚠️ رابط سيرفر مسعود
          #define RADAR_SERVER_URL @"http://34.204.178.160:8080"

          /**
           * 🛡️ PROJECT: ANOGS OFFSET EXTRACTOR (Live RE)
           * 👨‍💻 RESEARCHER: MASOUD (NASIRIYAH)
           */

          // حفظ الدوال الأصلية
          static int (*orig_access)(const char *path, int amode);
          static int (*orig_stat)(const char *path, struct stat *buf);
          static int (*orig_open)(const char *path, int oflag, ...);
          static int (*orig_sysctlbyname)(const char *name, void *oldp, size_t *oldlenp, void *newp, size_t newlen);
          static void* (*orig_dlsym)(void* handle, const char* symbol);

          // 📡 دالة الإرسال للسيرفر (إرسال الأوفست والهدف)
          void SendAnogsTelemetry(NSString *funcName, uintptr_t offset, NSString *targetPath) {
              dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_BACKGROUND, 0), ^{
                  NSString *offsetHex = [NSString stringWithFormat:@"0x%lx", offset];
                  NSDictionary *payload = @{
                      @"func": funcName,
                      @"offset": offsetHex,
                      @"target": targetPath ?: @"N/A"
                  };
                  NSData *jsonData = [NSJSONSerialization dataWithJSONObject:payload options:0 error:nil];
                  if (jsonData) {
                      NSURL *url = [NSURL URLWithString:RADAR_SERVER_URL];
                      NSMutableURLRequest *req = [NSMutableURLRequest requestWithURL:url];
                      [req setHTTPMethod:@"POST"];
                      [req setValue:@"application/json" forHTTPHeaderField:@"Content-Type"];
                      [req setHTTPBody:jsonData];
                      [[[NSURLSession sharedSession] dataTaskWithRequest:req] resume];
                  }
              });
          }

          // 🔍 المحرك الأساسي لاكتشاف anogs وحساب الأوفست
          void CheckIfAnogsAndReport(const char* func_name, const char* target) {
              Dl_info info;
              void* ret_addr = __builtin_return_address(0); // الحصول على عنوان من قام بالاستدعاء
              
              if (dladdr(ret_addr, &info) && info.dli_fname) {
                  NSString *caller = [NSString stringWithUTF8String:info.dli_fname];
                  
                  // 🔥 الفلتر: هل المتصل هو anogs؟
                  if ([caller containsString:@"anogs"]) {
                      // حساب الأوفست الحقيقي: (عنوان التنفيذ - عنوان بداية مكتبة anogs بالذاكرة)
                      uintptr_t offset = (uintptr_t)ret_addr - (uintptr_t)info.dli_fbase;
                      NSString *targetStr = target ? [NSString stringWithUTF8String:target] : @"Unknown";
                      
                      SendAnogsTelemetry([NSString stringWithUTF8String:func_name], offset, targetStr);
                  }
              }
          }

          // ==========================================
          // ⚔️ خطافات الصيد (Hooks)
          // ==========================================
          
          int hk_access(const char *path, int amode) {
              static __thread bool is_logging = false;
              if (!is_logging && path) {
                  is_logging = true;
                  CheckIfAnogsAndReport("access", path);
                  is_logging = false;
              }
              return orig_access(path, amode);
          }

          int hk_stat(const char *path, struct stat *buf) {
              static __thread bool is_logging = false;
              if (!is_logging && path) {
                  is_logging = true;
                  CheckIfAnogsAndReport("stat", path);
                  is_logging = false;
              }
              return orig_stat(path, buf);
          }

          int hk_open(const char *path, int oflag, ...) {
              static __thread bool is_logging = false;
              if (!is_logging && path) {
                  is_logging = true;
                  CheckIfAnogsAndReport("open", path);
                  is_logging = false;
              }
              va_list args;
              va_start(args, oflag);
              int mode = va_arg(args, int);
              va_end(args);
              return orig_open(path, oflag, mode);
          }

          int hk_sysctlbyname(const char *name, void *oldp, size_t *oldlenp, void *newp, size_t newlen) {
              static __thread bool is_logging = false;
              if (!is_logging && name) {
                  is_logging = true;
                  CheckIfAnogsAndReport("sysctlbyname", name); // خطير جداً يستخدم لفحص الجلبريك
                  is_logging = false;
              }
              return orig_sysctlbyname(name, oldp, oldlenp, newp, newlen);
          }

          void* hk_dlsym(void* handle, const char* symbol) {
              static __thread bool is_logging = false;
              if (!is_logging && symbol) {
                  is_logging = true;
                  CheckIfAnogsAndReport("dlsym", symbol); // يستخدمه للبحث عن دوال الغش
                  is_logging = false;
              }
              return orig_dlsym(handle, symbol);
          }

          // 🚀 التفعيل
          __attribute__((constructor))
          static void start_anogs_tracker() {
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 2 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  struct rebinding rebinds[] = {
                      {"access", (void *)hk_access, (void **)&orig_access},
                      {"stat", (void *)hk_stat, (void **)&orig_stat},
                      {"open", (void *)hk_open, (void **)&orig_open},
                      {"sysctlbyname", (void *)hk_sysctlbyname, (void **)&orig_sysctlbyname},
                      {"dlsym", (void *)hk_dlsym, (void **)&orig_dlsym}
                  };
                  rebind_symbols(rebinds, 5);
                  NSLog(@"[ANOGS EXTRACTOR] 👁️‍🗨️ Tracker Active. Hunting offsets...");
              });
          }
          EOF

      - name: 🚀 تجميع دايلب الرادار
        run: |
          clang++ -dynamiclib -std=c++11 -arch arm64 \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          jni/main.mm jni/fishhook.c \
          -o Masoud-Anogs-Offset-Tracker.dylib \
          -framework Foundation
          strip -x Masoud-Anogs-Offset-Tracker.dylib

      - name: 📦 حفظ الملف
        uses: actions/upload-artifact@v4
        with:
          name: Masoud-Anogs-Tracker
          path: Masoud-Anogs-Offset-Tracker.dylib
