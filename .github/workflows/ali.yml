name: Shammari V-MAX - Ultimate C2 App (IPA)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_shammari_app:
    name: Compile Shammari Master App
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Workspace
        run: |
          mkdir -p app_source
          mkdir -p Payload/ShammariApp.app

      - name: 📝 Info.plist (Permissions & Config)
        run: |
          cat << 'EOF' > app_source/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>ShammariApp</string>
              <key>CFBundleIdentifier</key><string>com.shammari.vmax.c2</string>
              <key>CFBundleName</key><string>Shammari C2</string>
              <key>CFBundleVersion</key><string>2.0</string>
              <key>CFBundleShortVersionString</key><string>2.0</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>UILaunchStoryboardName</key><string>LaunchScreen</string>
              <key>NSAppTransportSecurity</key>
              <dict><key>NSAllowsArbitraryLoads</key><true/></dict>
          </dict>
          </plist>
          EOF

      - name: 📱 Native iOS Code (The Masterpiece)
        run: |
          cat << 'EOF' > app_source/main.m
          #import <UIKit/UIKit.h>
          #import <objc/runtime.h>

          // ⚠️ رابط سيرفر الشمري
          #define API_URL @"http://pubg.myvnc.com/pubg.php"

          // --- واجهة تسجيل الدخول (The Login with Falcon) ---
          @interface LoginViewController : UIViewController
          @property (nonatomic, strong) UITextField *codeField;
          @property (nonatomic, strong) UIView *falconIcon;
          @end

          @implementation LoginViewController
          - (void)viewDidLoad {
              [super viewDidLoad];
              self.view.backgroundColor = [UIColor colorWithRed:0.02 green:0.02 blue:0.05 alpha:1.0];
              
              // 🦅 أنيميشن الصقر الطيار (Placeholder Icon)
              self.falconIcon = [[UIView alloc] initWithFrame:CGRectMake(self.view.bounds.size.width/2 - 40, 100, 80, 80)];
              self.falconIcon.backgroundColor = [UIColor cyanColor];
              self.falconIcon.layer.cornerRadius = 40;
              self.falconIcon.layer.shadowColor = [UIColor cyanColor].CGColor;
              self.falconIcon.layer.shadowRadius = 15;
              self.falconIcon.layer.shadowOpacity = 1.0;
              [self.view addSubview:self.falconIcon];
              
              // حركة الطيران
              CABasicAnimation *fly = [CABasicAnimation animationWithKeyPath:@"position.y"];
              fly.duration = 1.5;
              fly.toValue = @(120);
              fly.autoreverses = YES;
              fly.repeatCount = HUGE_VALF;
              [self.falconIcon.layer addAnimation:fly forKey:@"fly"];

              UILabel *shammariLabel = [[UILabel alloc] initWithFrame:CGRectMake(0, 200, self.view.bounds.size.width, 40)];
              shammariLabel.text = @"🦅 محمد الشمري 🦅";
              shammariLabel.textColor = [UIColor whiteColor];
              shammariLabel.textAlignment = NSTextAlignmentCenter;
              shammariLabel.font = [UIFont fontWithName:@"MarkerFelt-Wide" size:28];
              [self.view addSubview:shammariLabel];

              self.codeField = [[UITextField alloc] initWithFrame:CGRectMake(40, 300, self.view.bounds.size.width - 80, 50)];
              self.codeField.backgroundColor = [UIColor colorWithWhite:0.1 alpha:1.0];
              self.codeField.textColor = [UIColor whiteColor];
              self.codeField.placeholder = @"أدخل كود تفعيل الشمري...";
              self.codeField.textAlignment = NSTextAlignmentCenter;
              self.codeField.layer.cornerRadius = 15;
              self.codeField.secureTextEntry = YES;
              [self.view addSubview:self.codeField];

              UIButton *loginBtn = [UIButton buttonWithType:UIButtonTypeSystem];
              loginBtn.frame = CGRectMake(40, 370, self.view.bounds.size.width - 80, 55);
              loginBtn.backgroundColor = [UIColor systemBlueColor];
              [loginBtn setTitle:@"تـسـجـيـل الـدخول" forState:UIControlStateNormal];
              [loginBtn setTitleColor:[UIColor whiteColor] forState:UIControlStateNormal];
              loginBtn.titleLabel.font = [UIFont boldSystemFontOfSize:18];
              loginBtn.layer.cornerRadius = 15;
              [loginBtn addTarget:self action:@selector(handleLogin) forControlEvents:UIControlEventTouchUpInside];
              [self.view addSubview:loginBtn];
          }

          - (void)handleLogin {
              // ميزة فيكة: انتظار 3 ثواني تحميل
              UIView *loader = [[UIView alloc] initWithFrame:self.view.bounds];
              loader.backgroundColor = [UIColor blackColor];
              UILabel *t = [[UILabel alloc] initWithFrame:loader.bounds];
              t.text = @"جاري تشفير قناة الاتصال...\nبواسطة محمد الشمري";
              t.textColor = [UIColor cyanColor];
              t.numberOfLines = 2;
              t.textAlignment = NSTextAlignmentCenter;
              [loader addSubview:t];
              [self.view addSubview:loader];

              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 3 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  [self dismissViewControllerAnimated:YES completion:nil];
                  // هنا يتم الانتقال للواجهة الرئيسية (تلقائياً في AppDelegate)
              });
          }
          @end

          // --- الواجهة الرئيسية (Main Dashboard) ---
          @interface ShammariDashboard : UIViewController <UITableViewDelegate, UITableViewDataSource>
          @property (nonatomic, strong) UITableView *playersTable;
          @property (nonatomic, strong) UIView *sidebar;
          @property (nonatomic, strong) NSArray *playersList;
          @property (nonatomic, strong) UIView *statusDot;
          @end

          @implementation ShammariDashboard
          - (void)viewDidLoad {
              [super viewDidLoad];
              self.view.backgroundColor = [UIColor blackColor];
              
              // 1. شريط الحالة العلوي
              UIView *header = [[UIView alloc] initWithFrame:CGRectMake(0, 0, self.view.bounds.size.width, 100)];
              header.backgroundColor = [UIColor colorWithWhite:0.05 alpha:1.0];
              [self.view addSubview:header];
              
              self.statusDot = [[UIView alloc] initWithFrame:CGRectMake(20, 55, 12, 12)];
              self.statusDot.layer.cornerRadius = 6;
              self.statusDot.backgroundColor = [UIColor greenColor]; // متصل
              [header addSubview:self.statusDot];

              UILabel *t = [[UILabel alloc] initWithFrame:CGRectMake(40, 45, 200, 30)];
              t.text = @"Server: pubg.myvnc.com";
              t.textColor = [UIColor whiteColor];
              t.font = [UIFont boldSystemFontOfSize:12];
              [header addSubview:t];

              UIButton *menuBtn = [UIButton buttonWithType:UIButtonTypeSystem];
              menuBtn.frame = CGRectMake(self.view.bounds.size.width - 60, 45, 40, 40);
              [menuBtn setTitle:@"☰" forState:UIControlStateNormal];
              [menuBtn setTitleColor:[UIColor cyanColor] forState:UIControlStateNormal];
              menuBtn.titleLabel.font = [UIFont boldSystemFontOfSize:30];
              [menuBtn addTarget:self action:@selector(toggleSidebar) forControlEvents:UIControlEventTouchUpInside];
              [header addSubview:menuBtn];

              // 2. جدول اللاعبين
              self.playersTable = [[UITableView alloc] initWithFrame:CGRectMake(0, 100, self.view.bounds.size.width, self.view.bounds.size.height - 100)];
              self.playersTable.backgroundColor = [UIColor clearColor];
              self.playersTable.delegate = self;
              self.playersTable.dataSource = self;
              [self.view addSubview:self.playersTable];
              
              // بيانات وهمية للعرض
              self.playersList = @[
                  @{@"name": @"iPhone 15 Pro", @"udid": @"A1B2-C3D4-E5F6"},
                  @{@"name": @"iPad Pro M2", @"udid": @"X9Y8-Z7W6-V5U4"}
              ];

              [self setupSidebar];
          }

          - (void)setupSidebar {
              self.sidebar = [[UIView alloc] initWithFrame:CGRectMake(-280, 0, 280, self.view.bounds.size.height)];
              self.sidebar.backgroundColor = [UIColor colorWithRed:0.05 green:0.05 blue:0.1 alpha:0.95];
              [self.view addSubview:self.sidebar];
              
              UILabel *st = [[UILabel alloc] initWithFrame:CGRectMake(20, 60, 240, 40)];
              st.text = @"⚙️ الإعدادات والتحكم";
              st.textColor = [UIColor cyanColor];
              st.font = [UIFont boldSystemFontOfSize:20];
              [self.sidebar addSubview:st];

              // أزرار التحكم
              [self addSidebarBtn:@"حالة أمان: أمان 🟢" color:[UIColor greenColor] y:120 action:@selector(sendSafe)];
              [self addSidebarBtn:@"حالة أمان: خطر 🔴" color:[UIColor redColor] y:180 action:@selector(sendDanger)];
              [self addSidebarBtn:@"🚧 تفعيل وضع الصيانة" color:[UIColor orangeColor] y:240 action:@selector(sendMaint)];
              [self addSidebarBtn:@"☠️ تدمير الدايلب (كراش)" color:[UIColor purpleColor] y:300 action:@selector(sendCrash)];
          }

          - (void)addSidebarBtn:(NSString*)title color:(UIColor*)c y:(CGFloat)y action:(SEL)act {
              UIButton *b = [UIButton buttonWithType:UIButtonTypeSystem];
              b.frame = CGRectMake(20, y, 240, 45);
              b.backgroundColor = [c colorWithAlphaComponent:0.1];
              b.layer.borderWidth = 1;
              b.layer.borderColor = c.CGColor;
              b.layer.cornerRadius = 10;
              [b setTitle:title forState:UIControlStateNormal];
              [b setTitleColor:c forState:UIControlStateNormal];
              [b addTarget:self action:act forControlEvents:UIControlEventTouchUpInside];
              [self.sidebar addSubview:b];
          }

          - (void)toggleSidebar {
              CGFloat targetX = (self.sidebar.frame.origin.x == 0) ? -280 : 0;
              [UIView animateWithDuration:0.3 animations:^{
                  self.sidebar.frame = CGRectMake(targetX, 0, 280, self.view.bounds.size.height);
              }];
          }

          // ارسال الاوامر للسيرفر
          - (void)sendCommand:(NSString*)cmd {
              NSURL *url = [NSURL URLWithString:[NSString stringWithFormat:@"%@?action=%@", API_URL, cmd]];
              [[[NSURLSession sharedSession] dataTaskWithURL:url] resume];
              [self toggleSidebar];
          }

          - (void)sendSafe { [self sendCommand:@"safe"]; }
          - (void)sendDanger { [self sendCommand:@"danger"]; }
          - (void)sendMaint { [self sendCommand:@"maintenance"]; }
          - (void)sendCrash { [self sendCommand:@"crash"]; }

          // TableView Logic
          - (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section { return self.playersList.count; }
          - (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath {
              UITableViewCell *cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle reuseIdentifier:@"cell"];
              cell.backgroundColor = [UIColor clearColor];
              cell.textLabel.text = self.playersList[indexPath.row][@"name"];
              cell.textLabel.textColor = [UIColor whiteColor];
              cell.detailTextLabel.text = self.playersList[indexPath.row][@"udid"];
              cell.detailTextLabel.textColor = [UIColor grayColor];
              
              UIButton *ban = [UIButton buttonWithType:UIButtonTypeSystem];
              ban.frame = CGRectMake(0, 0, 60, 30);
              [ban setTitle:@"حظر" forState:UIControlStateNormal];
              [ban setTitleColor:[UIColor redColor] forState:UIControlStateNormal];
              cell.accessoryView = ban;
              return cell;
          }
          @end

          // --- محرك التطبيق ---
          @interface AppDelegate : UIResponder <UIApplicationDelegate>
          @property (strong, nonatomic) UIWindow *window;
          @end
          @implementation AppDelegate
          - (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {
              self.window = [[UIWindow alloc] initWithFrame:[UIScreen mainScreen].bounds];
              self.window.rootViewController = [[ShammariDashboard alloc] init];
              [self.window makeKeyAndVisible];
              
              // إظهار اللوكن فوق الواجهة
              LoginViewController *login = [[LoginViewController alloc] init];
              login.modalPresentationStyle = UIModalPresentationFullScreen;
              [self.window.rootViewController presentViewController:login animated:NO completion:nil];
              return YES;
          }
          @end

          int main(int argc, char * argv[]) {
              @autoreleasepool { return UIApplicationMain(argc, argv, nil, NSStringFromClass([AppDelegate class])); }
          }
          EOF

      - name: 🚀 Build App Binary
        run: |
          clang -fobjc-arc -arch arm64 \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -framework Foundation -framework UIKit \
          app_source/main.m -o Payload/ShammariApp.app/ShammariApp
          
          cp app_source/Info.plist Payload/ShammariApp.app/Info.plist

      - name: 📦 Create IPA
        run: |
          zip -r Shammari-Commander-V2.ipa Payload

      - name: 📤 Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Shammari-C2-Native-App
          path: Shammari-Commander-V2.ipa
