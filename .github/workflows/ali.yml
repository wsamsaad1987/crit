name: Imperial V-MAX - SVC Syscall Network PoC

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_svc_poc:
    name: Build SVC Bypass Network Proof
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🧪 Generate Network SVC Proof Source (Main.mm)
        run: |
          mkdir -p jni
          cat <<'EOF' > jni/main.mm
          #import <Foundation/Foundation.h>
          #import <unistd.h>
          #import <sys/syscall.h>

          /**
           * 🛡️ PROJECT: SVC INLINE SYSCALL BYPASS (NETWORK PoC)
           * 👨‍💻 RESEARCHER: MASOUD (NASIRIYAH)
           */

          // ⚠️ غير هذا الـ IP إلى الـ IP الخاص بلابتوبك الذي يظهر في سكربت البايثون
          #define RADAR_SERVER_URL @"http://34.204.178.160:8080" 

          int check_file_standard(const char *path) {
              return access(path, F_OK); 
          }

          int check_file_svc(const char *path) {
              int result;
              __asm__ volatile (
                  "mov x0, %1\n"
                  "mov x1, #0\n"
                  "mov x16, #33\n"
                  "svc #0x80\n"
                  "mov %w0, w0\n"
                  : "=r" (result)
                  : "r" (path)
                  : "x0", "x1", "x16", "memory"
              );
              return result;
          }

          __attribute__((constructor))
          static void run_svc_proof() {
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 3 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  
                  // ملف وهمي أو ملف أداة جلبريك للبحث عنه
                  const char *cheat_file = "/Library/MobileSubstrate/MobileSubstrate.dylib";
                  
                  int std_result = check_file_standard(cheat_file);
                  int svc_result = check_file_svc(cheat_file);
                  
                  // تجهيز البيانات لإرسالها للرادار (اللابتوب)
                  NSDictionary *payload = @{
                      @"standard_result": @(std_result),
                      @"svc_result": @(svc_result)
                  };
                  
                  NSData *jsonData = [NSJSONSerialization dataWithJSONObject:payload options:0 error:nil];
                  
                  if (jsonData) {
                      NSURL *url = [NSURL URLWithString:RADAR_SERVER_URL];
                      NSMutableURLRequest *request = [NSMutableURLRequest requestWithURL:url];
                      [request setHTTPMethod:@"POST"];
                      [request setValue:@"application/json" forHTTPHeaderField:@"Content-Type"];
                      [request setHTTPBody:jsonData];
                      
                      // إرسال الضربة بصمت
                      [[[NSURLSession sharedSession] dataTaskWithRequest:request] resume];
                  }
              });
          }
          EOF

      - name: 🚀 Compile Network SVC PoC Dylib
        run: |
          clang++ -dynamiclib -std=c++11 -arch arm64 \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          jni/main.mm \
          -o Masoud-SVC-Network.dylib \
          -framework Foundation
          strip -x Masoud-SVC-Network.dylib

      - name: 📦 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Masoud-SVC-Network-Dylib
          path: Masoud-SVC-Network.dylib
