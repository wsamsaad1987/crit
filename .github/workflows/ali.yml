name: Imperial V-MAX - Non-JB Radar & Spoofer

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_non_jb_radar:
    name: Compile Safe Radar (No Jailbreak)
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Fishhook
        run: |
          mkdir -p jni
          curl -sL https://raw.githubusercontent.com/facebook/fishhook/master/fishhook.c -o jni/fishhook.cpp
          curl -sL https://raw.githubusercontent.com/facebook/fishhook/master/fishhook.h -o jni/fishhook.h

      - name: Generate C++ Payload (Main.mm)
        run: |
          cat <<'EOF' > jni/main.mm
          #import <Foundation/Foundation.h>
          #import <dlfcn.h>
          #import <sys/socket.h>
          #import <arpa/inet.h>
          #import <sys/sysctl.h>
          #include "fishhook.h"

          // ⚠️ C2 Server (Masoud RDP)
          #define C2_IP "44.192.33.117"
          #define C2_PORT 8080

          // ==========================================
          // 🛡️ MASOUD RADAR (NON-JAILBREAK SAFE MODE)
          // ==========================================
          static NSMutableSet* g_reported_offsets = nil; 

          static int (*orig_sysctlbyname)(const char *name, void *oldp, size_t *oldlenp, void *newp, size_t newlen);
          static void* (*orig_dlsym)(void* handle, const char* symbol);
          static FILE* (*orig_fopen)(const char *filename, const char *mode);

          // إرسال البيانات للسيرفر
          void SendToRadar(NSDictionary *data) {
              dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_BACKGROUND, 0), ^{
                  NSData *json = [NSJSONSerialization dataWithJSONObject:data options:0 error:nil];
                  if (!json) return;
                  int sock = socket(AF_INET, SOCK_STREAM, 0);
                  if (sock < 0) return;
                  struct sockaddr_in srv;
                  srv.sin_family = AF_INET; srv.sin_port = htons(C2_PORT);
                  inet_pton(AF_INET, C2_IP, &srv.sin_addr);
                  struct timeval tv = {1, 0}; setsockopt(sock, SOL_SOCKET, SO_SNDTIMEO, &tv, sizeof(tv));
                  if (connect(sock, (struct sockaddr *)&srv, sizeof(srv)) == 0) send(sock, [json bytes], [json length], 0);
                  close(sock);
              });
          }

          // فحص الهوية والتبليغ (آمن جداً)
          void AnalyzeAndSpoof(const char* func_name, const char* target) {
              void* ret_addr = __builtin_return_address(0);
              Dl_info info;
              
              if (dladdr(ret_addr, &info) && info.dli_fname) {
                  NSString *caller = [[NSString stringWithUTF8String:info.dli_fname] lowercaseString];
                  
                  if ([caller containsString:@"anogs"]) {
                      uintptr_t ida_offset = (uintptr_t)ret_addr - (uintptr_t)info.dli_fbase;
                      NSString* offsetStr = [NSString stringWithFormat:@"0x%lx", ida_offset];
                      
                      @synchronized(g_reported_offsets) {
                          if ([g_reported_offsets containsObject:offsetStr]) return;
                          [g_reported_offsets addObject:offsetStr];
                      }
                      
                      SendToRadar(@{
                          @"func": [NSString stringWithUTF8String:func_name],
                          @"offset": offsetStr,
                          @"target": target ? [NSString stringWithUTF8String:target] : @"NULL",
                          @"caller": @"anogs"
                      });
                  }
              }
          }

          // ==========================================
          // ⚔️ التضليل الآمن (Spoofing) لنسخ الـ Sideload
          // ==========================================
          
          int hk_sysctlbyname(const char *name, void *oldp, size_t *oldlenp, void *newp, size_t newlen) {
              AnalyzeAndSpoof("sysctlbyname", name);
              
              // خداع الحماية إذا بحثت عن أدوات جلبريك
              if (name && (strstr(name, "hw.machine") || strstr(name, "kern.osversion"))) {
                  // نمررها بأمان
              }
              return orig_sysctlbyname(name, oldp, oldlenp, newp, newlen);
          }

          void* hk_dlsym(void* handle, const char* symbol) {
              AnalyzeAndSpoof("dlsym", symbol);
              
              // تعمية dlsym بدون تعديل الذاكرة
              if (symbol && (strstr(symbol, "ptrace") || strstr(symbol, "MSHook") || strstr(symbol, "Substrate"))) {
                  return NULL; // نرجّع صفر، نعلمه إن الدالة ما موجودة!
              }
              return orig_dlsym(handle, symbol);
          }

          FILE* hk_fopen(const char *filename, const char *mode) {
              AnalyzeAndSpoof("fopen", filename);
              
              // حظر قراءة ملفات مشبوهة
              if (filename && (strstr(filename, "Cydia") || strstr(filename, "TDM_KV.log"))) {
                  return NULL; // نكوله الملف ممسوح!
              }
              return orig_fopen(filename, mode);
          }

          __attribute__((constructor))
          static void start_non_jb_radar() {
              g_reported_offsets = [[NSMutableSet alloc] init];
              
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 2 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  SendToRadar(@{@"func": @"RADAR_INIT", @"offset": @"0x0", @"target": @"Non-JB Radar Active!", @"caller": @"System"});
                  
                  struct rebinding hooks[] = {
                      {"sysctlbyname", (void *)hk_sysctlbyname, (void **)&orig_sysctlbyname},
                      {"dlsym", (void *)hk_dlsym, (void **)&orig_dlsym},
                      {"fopen", (void *)hk_fopen, (void **)&orig_fopen}
                  };
                  rebind_symbols(hooks, 3);
              });
          }
          EOF

      - name: Compile Dylib
        run: |
          clang++ -dynamiclib -std=c++11 -arch arm64 \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          jni/main.mm jni/fishhook.cpp -o Masoud-NonJB-Radar.dylib \
          -framework Foundation
          strip -x Masoud-NonJB-Radar.dylib

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Masoud-NonJB-Radar
          path: Masoud-NonJB-Radar.dylib
