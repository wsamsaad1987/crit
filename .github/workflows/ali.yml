name: Imperial V-MAX - Native iOS C2 App (Real IPA)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_native_ipa:
    name: Compile Native iOS Control Panel
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Prepare Workspace (App Structure)
        run: |
          mkdir -p app_source
          mkdir -p Payload/FalconEye.app

      - name: 📝 Generate Info.plist
        run: |
          cat << 'EOF' > app_source/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>FalconEye</string>
              <key>CFBundleIdentifier</key><string>com.masoud.falcon.c2</string>
              <key>CFBundleName</key><string>Falcon C2</string>
              <key>CFBundleVersion</key><string>1.0</string>
              <key>CFBundleShortVersionString</key><string>1.0</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>UILaunchStoryboardName</key><string>LaunchScreen</string>
              <key>NSAppTransportSecurity</key>
              <dict>
                  <key>NSAllowsArbitraryLoads</key><true/> <!-- السماح بالاتصال بسيرفر HTTP -->
              </dict>
          </dict>
          </plist>
          EOF

      - name: 📱 Generate Native iOS Source Code (Objective-C/UIKit)
        run: |
          cat << 'EOF' > app_source/main.m
          #import <UIKit/UIKit.h>

          // ⚠️ رابط سيرفر مسعود
          #define API_URL @"http://pubg.myvnc.com/pubg.php"

          // ==========================================
          // 🎨 الواجهة الحقيقية للتطبيق (Native UI)
          // ==========================================
          @interface MasoudDashboardVC : UIViewController
          @property (nonatomic, strong) UILabel *statusLabel;
          @property (nonatomic, strong) UIView *statusIndicator;
          @property (nonatomic, strong) UITextView *logsView;
          @end

          @implementation MasoudDashboardVC

          - (void)viewDidLoad {
              [super viewDidLoad];
              self.view.backgroundColor = [UIColor colorWithRed:0.05 green:0.06 blue:0.1 alpha:1.0]; // خلفية داكنة فخمة

              // 1. الهيدر
              UILabel *title = [[UILabel alloc] initWithFrame:CGRectMake(20, 60, self.view.bounds.size.width - 40, 40)];
              title.text = @"🦅 FALCON EYE COMMANDER";
              title.textColor = [UIColor cyanColor];
              title.font = [UIFont boldSystemFontOfSize:22];
              title.textAlignment = NSTextAlignmentCenter;
              [self.view addSubview:title];

              // 2. حالة السيرفر واللمبة
              UIView *statusCard = [[UIView alloc] initWithFrame:CGRectMake(20, 120, self.view.bounds.size.width - 40, 80)];
              statusCard.backgroundColor = [UIColor colorWithWhite:0.1 alpha:0.8];
              statusCard.layer.cornerRadius = 15;
              statusCard.layer.borderWidth = 1;
              statusCard.layer.borderColor = [UIColor darkGrayColor].CGColor;
              [self.view addSubview:statusCard];

              self.statusIndicator = [[UIView alloc] initWithFrame:CGRectMake(20, 30, 20, 20)];
              self.statusIndicator.layer.cornerRadius = 10;
              self.statusIndicator.backgroundColor = [UIColor grayColor]; // لمبة رمادية بالبداية
              [statusCard addSubview:self.statusIndicator];

              self.statusLabel = [[UILabel alloc] initWithFrame:CGRectMake(60, 25, 200, 30)];
              self.statusLabel.text = @"جاري الاتصال بالسيرفر...";
              self.statusLabel.textColor = [UIColor whiteColor];
              self.statusLabel.font = [UIFont boldSystemFontOfSize:16];
              [statusCard addSubview:self.statusLabel];

              // 3. أزرار التحكم الحقيقية (Native Buttons)
              UIButton *btnSafe = [self createButtonWithTitle:@"أمان 🟢" color:[UIColor systemGreenColor] yPos:220];
              [btnSafe addTarget:self action:@selector(sendSafeCommand) forControlEvents:UIControlEventTouchUpInside];
              [self.view addSubview:btnSafe];

              UIButton *btnDanger = [self createButtonWithTitle:@"خطر 🔴" color:[UIColor systemRedColor] yPos:280];
              [btnDanger addTarget:self action:@selector(sendDangerCommand) forControlEvents:UIControlEventTouchUpInside];
              [self.view addSubview:btnDanger];

              UIButton *btnCrash = [self createButtonWithTitle:@"☠️ تدمير الدايلب (كراش)" color:[UIColor purpleColor] yPos:340];
              [btnCrash addTarget:self action:@selector(sendCrashCommand) forControlEvents:UIControlEventTouchUpInside];
              [self.view addSubview:btnCrash];

              // 4. شاشة اللوجات (Terminal)
              self.logsView = [[UITextView alloc] initWithFrame:CGRectMake(20, 420, self.view.bounds.size.width - 40, self.view.bounds.size.height - 460)];
              self.logsView.backgroundColor = [UIColor blackColor];
              self.logsView.textColor = [UIColor greenColor];
              self.logsView.font = [UIFont fontWithName:@"Courier" size:12];
              self.logsView.editable = NO;
              self.logsView.layer.cornerRadius = 10;
              self.logsView.text = @"> System Initialized.\n";
              [self.view addSubview:self.logsView];

              // جلب البيانات فور تشغيل التطبيق
              [self fetchServerStatus];
          }

          - (UIButton *)createButtonWithTitle:(NSString *)title color:(UIColor *)color yPos:(CGFloat)yPos {
              UIButton *btn = [UIButton buttonWithType:UIButtonTypeSystem];
              btn.frame = CGRectMake(20, yPos, self.view.bounds.size.width - 40, 50);
              btn.backgroundColor = [color colorWithAlphaComponent:0.2];
              btn.layer.borderColor = color.CGColor;
              btn.layer.borderWidth = 1.5;
              btn.layer.cornerRadius = 12;
              [btn setTitle:title forState:UIControlStateNormal];
              [btn setTitleColor:color forState:UIControlStateNormal];
              btn.titleLabel.font = [UIFont boldSystemFontOfSize:18];
              return btn;
          }

          - (void)logMessage:(NSString *)msg {
              dispatch_async(dispatch_get_main_queue(), ^{
                  self.logsView.text = [self.logsView.text stringByAppendingFormat:@"> %@\n", msg];
                  NSRange bottom = NSMakeRange(self.logsView.text.length - 1, 1);
                  [self.logsView scrollRangeToVisible:bottom];
              });
          }

          // ==========================================
          // 📡 دوال الاتصال بالسيرفر (API Calls)
          // ==========================================
          - (void)fetchServerStatus {
              [self logMessage:@"Fetching data from pubg.myvnc.com..."];
              NSURL *url = [NSURL URLWithString:[NSString stringWithFormat:@"%@?api=1", API_URL]];
              [[[NSURLSession sharedSession] dataTaskWithURL:url completionHandler:^(NSData *d, NSURLResponse *r, NSError *e) {
                  dispatch_async(dispatch_get_main_queue(), ^{
                      if (e || !d) {
                          self.statusIndicator.backgroundColor = [UIColor redColor];
                          self.statusLabel.text = @"Server Offline!";
                          [self logMessage:@"[ERROR] Connection Failed."];
                          return;
                      }
                      NSDictionary *json = [NSJSONSerialization JSONObjectWithData:d options:0 error:nil];
                      if (json) {
                          self.statusIndicator.backgroundColor = [UIColor greenColor];
                          self.statusIndicator.layer.shadowColor = [UIColor greenColor].CGColor;
                          self.statusIndicator.layer.shadowRadius = 8;
                          self.statusIndicator.layer.shadowOpacity = 1.0;
                          
                          NSString *status = json[@"status"];
                          NSString *sec = json[@"security"];
                          self.statusLabel.text = [NSString stringWithFormat:@"Status: %@ | Sec: %@", [status uppercaseString], [sec uppercaseString]];
                          [self logMessage:@"[SUCCESS] Sync complete."];
                      }
                  });
              }] resume];
          }

          - (void)sendCommand:(NSString *)action {
              [self logMessage:[NSString stringWithFormat:@"Sending command: %@...", action]];
              
              NSURL *url = [NSURL URLWithString:API_URL];
              NSMutableURLRequest *req = [NSMutableURLRequest requestWithURL:url];
              req.HTTPMethod = @"POST";
              NSString *postString = [NSString stringWithFormat:@"action=%@&admin=true", action]; // محاكاة جلسة الأدمن
              req.HTTPBody = [postString dataUsingEncoding:NSUTF8StringEncoding];
              
              [[[NSURLSession sharedSession] dataTaskWithRequest:req completionHandler:^(NSData *d, NSURLResponse *r, NSError *e) {
                  if (!e) {
                      [self logMessage:[NSString stringWithFormat:@"[SUCCESS] Command '%@' executed.", action]];
                      [self fetchServerStatus]; // تحديث الواجهة
                  } else {
                      [self logMessage:@"[ERROR] Command failed to send."];
                  }
              }] resume];
          }

          - (void)sendSafeCommand { [self sendCommand:@"safe"]; }
          - (void)sendDangerCommand { [self sendCommand:@"danger"]; }
          - (void)sendCrashCommand { [self sendCommand:@"crash"]; }

          @end

          // ==========================================
          // 📱 محرك التطبيق الأساسي (AppDelegate)
          // ==========================================
          @interface AppDelegate : UIResponder <UIApplicationDelegate>
          @property (strong, nonatomic) UIWindow *window;
          @end

          @implementation AppDelegate
          - (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {
              self.window = [[UIWindow alloc] initWithFrame:[UIScreen mainScreen].bounds];
              MasoudDashboardVC *vc = [[MasoudDashboardVC alloc] init];
              self.window.rootViewController = vc;
              [self.window makeKeyAndVisible];
              return YES;
          }
          @end

          int main(int argc, char * argv[]) {
              @autoreleasepool {
                  return UIApplicationMain(argc, argv, nil, NSStringFromClass([AppDelegate class]));
              }
          }
          EOF

      - name: 🛠️ Install ldid (For Pseudo-Signing)
        run: brew install ldid

      - name: 🚀 Compile Objective-C to Native iOS Binary
        run: |
          cd app_source
          # هنا يتم استخدام مترجم آبل الرسمي (clang) لصناعة التطبيق الحقيقي
          clang -fobjc-arc -arch arm64 \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -framework Foundation -framework UIKit \
          main.m -o FalconEye

      - name: 📦 Build the IPA Structure
        run: |
          # نقل الملفات المترجمة إلى هيكل تطبيق الآيفون الرسمي
          cp app_source/FalconEye Payload/FalconEye.app/
          cp app_source/Info.plist Payload/FalconEye.app/
          
          # توقيع وهمي (Ad-Hoc Signing) للتطبيق ليعمل بعد دمجه في أجهزة الجلبريك أو توقيعه بشهادة
          ldid -S Payload/FalconEye.app/FalconEye
          
          # ضغط المجلد لإنشاء ملف الـ IPA النهائي
          zip -r Masoud-Native-C2.ipa Payload

      - name: 📤 Upload Native App (.ipa)
        uses: actions/upload-artifact@v4
        with:
          name: Masoud-Native-C2-App
          path: Masoud-Native-C2.ipa
