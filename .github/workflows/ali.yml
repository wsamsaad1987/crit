name: Imperial V-MAX - Masterpiece (Offset 0x459C + Safe Login)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_masterpiece:
    name: Compile The Masterpiece Dylib
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Fishhook
        run: |
          mkdir -p jni
          curl -sL https://raw.githubusercontent.com/facebook/fishhook/master/fishhook.c -o jni/fishhook.cpp
          curl -sL https://raw.githubusercontent.com/facebook/fishhook/master/fishhook.h -o jni/fishhook.h

      - name: Generate C++ Payload (Main.mm)
        run: |
          cat <<'EOF' > jni/main.mm
          #import <Foundation/Foundation.h>
          #import <mach-o/dyld.h>
          #import <dlfcn.h>
          #import <sys/sysctl.h>
          #include "fishhook.h"

          /**
           * ========================================================
           * 🛡️ MASOUD MASTERPIECE (THE ULTIMATE BYPASS)
           * 🎯 TARGET: OFFSET 0x459C
           * ✅ SAFE LOGIN (No sel_registerName blocking)
           * 🚫 OFFLINE MODE (No Radar/TCP to prevent 10m bans)
           * ========================================================
           */
           
          static uintptr_t g_anogs_base = 0;
          static uintptr_t g_anogs_slide = 0;
          static uintptr_t g_anogs_end = 0;
          static bool g_anogs_found = false;

          static int (*orig_sysctlbyname)(const char *name, void *oldp, size_t *oldlenp, void *newp, size_t newlen);
          static void* (*orig_dlsym)(void* handle, const char* symbol);
          static FILE* (*orig_fopen)(const char *filename, const char *mode);
          static int (*orig_access)(const char *path, int amode);

          // حساب الأوفست الدقيق لضمان استهداف anogs فقط
          uintptr_t GetExactAnogsOffset() {
              if (!g_anogs_found) return 0;
              uintptr_t ret_addr = (uintptr_t)__builtin_return_address(0);
              if (ret_addr >= g_anogs_base && ret_addr < g_anogs_end) {
                  return ret_addr - g_anogs_slide;
              }
              return 0;
          }

          // ==========================================
          // ⚔️ جدار الحماية الذكي والموجه (Sniper Mode)
          // ==========================================

          int hk_sysctlbyname(const char *name, void *oldp, size_t *oldlenp, void *newp, size_t newlen) {
              return orig_sysctlbyname(name, oldp, oldlenp, newp, newlen);
          }

          void* hk_dlsym(void* handle, const char* symbol) {
              uintptr_t offset = GetExactAnogsOffset();

              if (offset > 0 && symbol) {
                  NSString *symStr = [NSString stringWithUTF8String:symbol];
                  
                  // 🔥 السحر هنا: نتدخل فقط في منطقة الخطر (أوفست مسعود 0x459C)
                  if (offset > 0x4500 && offset < 0x4600) {
                      
                      // حظر أدوات الهاك فقط، السماح لدوال النظام بالمرور لنجاح تسجيل الدخول
                      NSArray *cheat_symbols = @[@"ptrace", @"MSHook", @"Substrate", @"fishhook", @"Cydia"];
                      
                      for (NSString *cheat in cheat_symbols) {
                          if ([symStr containsString:cheat]) {
                              NSLog(@"[MASOUD SNIPER] HEADSHOT! Blocked Cheat Search at 0x%lx: %@", offset, symStr);
                              return NULL; // إعماء الجاسوس
                          }
                      }
                  }
              }
              return orig_dlsym(handle, symbol);
          }

          FILE* hk_fopen(const char *filename, const char *mode) {
              uintptr_t offset = GetExactAnogsOffset();
              if (offset > 0 && filename) {
                  NSString *fileStr = [NSString stringWithUTF8String:filename];
                  
                  // منطقة قراءة الملفات (حول الأوفست 0x4664 اللي صدناه سابقاً)
                  if (offset > 0x4600 && offset < 0x4700) {
                      if ([fileStr containsString:@"Cydia"] || [fileStr containsString:@"TDM_KV"] || [fileStr containsString:@"Masoud"]) {
                          NSLog(@"[MASOUD SNIPER] Blocked File Read at 0x%lx: %@", offset, fileStr);
                          return NULL; 
                      }
                  }
              }
              return orig_fopen(filename, mode);
          }
          
          int hk_access(const char *path, int amode) {
              uintptr_t offset = GetExactAnogsOffset();
              if (offset > 0 && path) {
                  NSString *pathStr = [NSString stringWithUTF8String:path];
                  
                  if (offset > 0x4600 && offset < 0x4700) {
                      if ([pathStr containsString:@"Cydia"] || [pathStr containsString:@"TDM_KV"]) {
                          return -1; 
                      }
                  }
              }
              return orig_access(path, amode);
          }

          // ==========================================
          // 🚀 التهيئة
          // ==========================================
          void InitializeGhostMap() {
              dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_HIGH, 0), ^{
                  while (!g_anogs_found) {
                      for (uint32_t i = 0; i < _dyld_image_count(); i++) {
                          if (strstr(_dyld_get_image_name(i), "anogs")) {
                              g_anogs_slide = _dyld_get_image_vmaddr_slide(i);
                              g_anogs_base = (uintptr_t)_dyld_get_image_header(i);
                              g_anogs_end = g_anogs_base + 0x8000000;
                              g_anogs_found = true;
                              NSLog(@"[MASOUD LAB] 🛡️ MASTERPIECE LOADED! Watching 0x459C...");
                              break;
                          }
                      }
                      if (!g_anogs_found) sleep(1);
                  }
              });
          }

          __attribute__((constructor))
          static void start_masterpiece() {
              struct rebinding hooks[] = {
                  {"sysctlbyname", (void *)hk_sysctlbyname, (void **)&orig_sysctlbyname},
                  {"dlsym", (void *)hk_dlsym, (void **)&orig_dlsym},
                  {"fopen", (void *)hk_fopen, (void **)&orig_fopen},
                  {"access", (void *)hk_access, (void **)&orig_access}
              };
              rebind_symbols(hooks, 4);
              InitializeGhostMap();
          }
          EOF

      - name: Compile Masterpiece
        run: |
          clang++ -dynamiclib -std=c++11 -arch arm64 \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          jni/main.mm jni/fishhook.cpp -o Masoud-Masterpiece.dylib \
          -framework Foundation
          strip -x Masoud-Masterpiece.dylib

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Masoud-Masterpiece
          path: Masoud-Masterpiece.dylib
