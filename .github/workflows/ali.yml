name: Imperial V-MAX - Config Hijacker & Radar

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_json_hijacker_radar:
    name: Compile JSON Hijacker with Radar
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Obj-C Payload (Main.mm)
        run: |
          mkdir -p jni
          cat <<'EOF' > jni/main.mm
          #import <Foundation/Foundation.h>
          #import <objc/runtime.h>
          #import <sys/socket.h>
          #import <arpa/inet.h>
          #import <unistd.h>

          /**
           * ========================================================
           * 🛡️ MASOUD CONFIG HIJACKER + RADAR (NO-JB SAFE)
           * 🎯 يخترق أوامر Tencent ويرسل تقارير حية للرادار
           * ========================================================
           */

          // ⚠️ رابط سيرفر مسعود
          #define C2_IP "44.192.33.117"
          #define C2_PORT 8080

          // 📡 إرسال البيانات للترمنال
          void SendToRadar(NSString *funcName, NSString *targetInfo) {
              dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_BACKGROUND, 0), ^{
                  NSDictionary *data = @{
                      @"func": funcName,
                      @"target": targetInfo,
                      @"caller": @"JSON_Hijacker",
                      @"threat": @"INFO"
                  };
                  NSData *json = [NSJSONSerialization dataWithJSONObject:data options:0 error:nil];
                  if (!json) return;
                  
                  int sock = socket(AF_INET, SOCK_STREAM, 0);
                  if (sock < 0) return;
                  
                  struct sockaddr_in srv;
                  srv.sin_family = AF_INET; 
                  srv.sin_port = htons(C2_PORT);
                  inet_pton(AF_INET, C2_IP, &srv.sin_addr);
                  
                  struct timeval tv = {1, 0}; 
                  setsockopt(sock, SOL_SOCKET, SO_SNDTIMEO, &tv, sizeof(tv));
                  
                  if (connect(sock, (struct sockaddr *)&srv, sizeof(srv)) == 0) {
                      send(sock, [json bytes], [json length], 0);
                  }
                  close(sock);
              });
          }

          // حفظ الدالة الأصلية لقراءة الـ JSON
          static id (*orig_JSONObjectWithData)(Class, SEL, NSData *, NSJSONReadingOptions, NSError **);

          // 🔄 الدالة المخترقة (تعترض الملفات وتعدلها)
          id hk_JSONObjectWithData(Class self, SEL _cmd, NSData *data, NSJSONReadingOptions opt, NSError **err) {
              id result = orig_JSONObjectWithData(self, _cmd, data, opt, err);

              if ([result isKindOfClass:[NSDictionary class]]) {
                  NSDictionary *dict = (NSDictionary *)result;

                  // 3. نفحص: هل هذا هو ملف getconfig؟
                  if (dict[@"biz_data"] && dict[@"biz_data"][@"merged_cfg"]) {
                      
                      NSMutableDictionary *mDict = [dict mutableCopy];
                      NSMutableDictionary *bizData = [mDict[@"biz_data"] mutableCopy];
                      NSMutableDictionary *mergedCfg = [bizData[@"merged_cfg"] mutableCopy];

                      for (NSString *key in [mergedCfg allKeys]) {
                          id innerVal = mergedCfg[key];
                          if ([innerVal isKindOfClass:[NSDictionary class]]) {
                              NSMutableDictionary *innerDict = [innerVal mutableCopy];

                              // 🔥 تدمير أوامر التجسس والمراقبة!
                              if (innerDict[@"GEnableUploadStatInfo"]) innerDict[@"GEnableUploadStatInfo"] = @"false";
                              if (innerDict[@"XPCallReportCrashKitBattle"]) innerDict[@"XPCallReportCrashKitBattle"] = @"false";
                              if (innerDict[@"XPCallReportCrashKitBattleTrace"]) innerDict[@"XPCallReportCrashKitBattleTrace"] = @"false";
                              if (innerDict[@"USFSKickoutPkgName"]) innerDict[@"USFSKickoutPkgName"] = @"";
                              if (innerDict[@"USFSKickoutPkgName_1"]) innerDict[@"USFSKickoutPkgName_1"] = @"";
                              if (innerDict[@"EnableClientInGameReplay"]) innerDict[@"EnableClientInGameReplay"] = @"0";

                              mergedCfg[key] = innerDict;
                          }
                      }

                      // تدمير نظام (GEM) لمراقبة المعالج
                      if (mDict[@"GEM"]) {
                          NSMutableDictionary *gemDict = [mDict[@"GEM"] mutableCopy];
                          gemDict[@"cpu"] = @"0";
                          gemDict[@"battery"] = @"0";
                          gemDict[@"netflow"] = @"0";
                          gemDict[@"ping"] = @"0";
                          mDict[@"GEM"] = gemDict;
                      }

                      bizData[@"merged_cfg"] = mergedCfg;
                      mDict[@"biz_data"] = bizData;

                      // 📡 إرسال إشعار للترمنال بنجاح الاختراق
                      SendToRadar(@"GETCONFIG_HIJACKED", @"Tencent Orders Neutralized Successfully! 💀");
                      NSLog(@"[MASOUD LAB] 🎯 GETCONFIG HIJACKED!");
                      
                      return [mDict copy];
                  }
              }
              return result;
          }

          // ==========================================
          // 🚀 التشغيل
          // ==========================================
          __attribute__((constructor))
          static void start_json_hijacker() {
              // الحقن السلس بدون أي Fishhook
              Method m = class_getClassMethod([NSJSONSerialization class], @selector(JSONObjectWithData:options:error:));
              orig_JSONObjectWithData = (id (*)(Class, SEL, NSData *, NSJSONReadingOptions, NSError **))method_getImplementation(m);
              method_setImplementation(m, (IMP)hk_JSONObjectWithData);
              
              // 📡 إرسال إشارة الحياة للترمنال
              SendToRadar(@"SYSTEM_INIT", @"JSON Hijacker + Radar is ACTIVE 🦅");
              NSLog(@"[MASOUD LAB] 🦅 CONFIG HIJACKER ACTIVE!");
          }
          EOF

      - name: Compile JSON Hijacker Dylib
        run: |
          clang++ -dynamiclib -std=c++11 -arch arm64 \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          jni/main.mm -o Masoud-Hijacker-Radar.dylib \
          -framework Foundation -lobjc
          
          strip -x Masoud-Hijacker-Radar.dylib

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Masoud-Hijacker-Radar
          path: Masoud-Hijacker-Radar.dylib
