name: Imperial V-MAX - Truth Radar & Spoofer

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_truth_radar:
    name: Compile Truth Radar Dylib
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch Fishhook
        run: |
          mkdir -p jni
          curl -sL https://raw.githubusercontent.com/facebook/fishhook/master/fishhook.c -o jni/fishhook.c
          curl -sL https://raw.githubusercontent.com/facebook/fishhook/master/fishhook.h -o jni/fishhook.h

      - name: Generate Radar Payload (Main.mm)
        run: |
          cat <<'EOF' > jni/main.mm
          #import <Foundation/Foundation.h>
          #import <UIKit/UIKit.h>
          #import <objc/runtime.h>
          #import <dlfcn.h>
          #import <sys/socket.h>
          #import <arpa/inet.h>
          #include "fishhook.h"

          // ⚠️ رابط سيرفر مسعود
          #define RADAR_IP "44.192.33.117"
          #define RADAR_PORT 8080

          /**
           * ========================================================
           * 🛡️ MASOUD TRUTH RADAR (NETWORK MONITOR + HEAVY SPOOF)
           * ========================================================
           */
           
          static NSMutableSet* g_reported_logs = nil;

          // 📡 الإرسال للسيرفر (الترمنال)
          void SendToRadar(NSString *type, NSString *target) {
              dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_BACKGROUND, 0), ^{
                  NSString* uniqueKey = [NSString stringWithFormat:@"%@_%@", type, target];
                  @synchronized(g_reported_logs) {
                      if ([g_reported_logs containsObject:uniqueKey]) return;
                      [g_reported_logs addObject:uniqueKey];
                  }

                  NSDictionary *payload = @{ @"func": type, @"target": target, @"caller": @"System_Radar" };
                  NSData *jsonData = [NSJSONSerialization dataWithJSONObject:payload options:0 error:nil];
                  if (!jsonData) return;
                  
                  int sock = socket(AF_INET, SOCK_STREAM, 0);
                  if (sock < 0) return;
                  struct sockaddr_in srv;
                  srv.sin_family = AF_INET; srv.sin_port = htons(RADAR_PORT);
                  inet_pton(AF_INET, RADAR_IP, &srv.sin_addr);
                  struct timeval tv = {1, 0}; setsockopt(sock, SOL_SOCKET, SO_SNDTIMEO, &tv, sizeof(tv));
                  if (connect(sock, (struct sockaddr *)&srv, sizeof(srv)) == 0) send(sock, [jsonData bytes], [jsonData length], 0);
                  close(sock);
              });
          }

          // ==========================================
          // 🎭 التمويه العميق (Spoofing)
          // ==========================================
          void SafeSwizzle(Class c, SEL orig, IMP newImp, IMP* oldImp) {
              Method m = class_getInstanceMethod(c, orig);
              if (!m) m = class_getClassMethod(c, orig);
              if (m) { *oldImp = method_getImplementation(m); method_setImplementation(m, newImp); }
          }

          // تزييف روابط الإنترنت (مراقبة ما يرسله الجاسوس للسيرفر)
          typedef id (*URLWithString_t)(id, SEL, NSString *);
          static URLWithString_t orig_URLWithString;
          id hk_URLWithString(id self, SEL _cmd, NSString *urlStr) {
              if (urlStr && [urlStr isKindOfClass:[NSString class]]) {
                  // إذا كان الرابط يخص حماية اللعبة، نرسله للترمنال فوراً!
                  if ([urlStr containsString:@"tencent"] || [urlStr containsString:@"tdatamaster"] || [urlStr containsString:@"crashsight"]) {
                      SendToRadar(@"NETWORK_URL", urlStr);
                  }
              }
              return orig_URLWithString(self, _cmd, urlStr);
          }

          // ==========================================
          // 👁️ خطافات المراقبة (C-Hooks)
          // ==========================================
          static void* (*orig_dlsym)(void* handle, const char* symbol);
          static FILE* (*orig_fopen)(const char *filename, const char *mode);

          void* hk_dlsym(void* handle, const char* symbol) {
              if (symbol) {
                  NSString *symStr = [NSString stringWithUTF8String:symbol];
                  NSArray *cheats = @[@"ptrace", @"MSHook", @"Substrate", @"fishhook", @"Cydia"];
                  for (NSString *cheat in cheats) {
                      if ([symStr containsString:cheat]) {
                          SendToRadar(@"BLOCKED_DLSYM", symStr);
                          return NULL; // تمويه: نعمي الجاسوس عن الهاك
                      }
                  }
              }
              return orig_dlsym(handle, symbol);
          }

          FILE* hk_fopen(const char *filename, const char *mode) {
              if (filename) {
                  NSString *fileStr = [NSString stringWithUTF8String:filename];
                  if ([fileStr containsString:@"Cydia"] || [fileStr containsString:@"TDM_KV"] || [fileStr containsString:@"Masoud"]) {
                      SendToRadar(@"BLOCKED_FILE", fileStr);
                      return NULL; // تمويه: نمنع قراءة الملفات المشبوهة
                  }
              }
              return orig_fopen(filename, mode);
          }

          // ==========================================
          // 🚀 التشغيل
          // ==========================================
          __attribute__((constructor))
          static void deploy_truth_radar() {
              g_reported_logs = [[NSMutableSet alloc] init];
              
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 2 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  
                  // تفعيل التمويه وتزييف الهوية
                  SafeSwizzle([NSURL class], @selector(URLWithString:), (IMP)hk_URLWithString, (IMP*)&orig_URLWithString);
                  method_setImplementation(class_getInstanceMethod([UIDevice class], @selector(model)), imp_implementationWithBlock(^NSString* (id self) { return @"iPad"; }));
                  
                  // تفعيل خطافات المراقبة
                  struct rebinding rebinds[] = {
                      {"dlsym", (void *)hk_dlsym, (void **)&orig_dlsym},
                      {"fopen", (void *)hk_fopen, (void **)&orig_fopen}
                  };
                  rebind_symbols(rebinds, 2);

                  SendToRadar(@"SYSTEM_INIT", @"Truth Radar & Spoofer Active!");
                  NSLog(@"[MASOUD LAB] 🦅 Truth Radar Deployed.");
              });
          }
          EOF

      - name: Compile Truth Radar
        run: |
          clang++ -dynamiclib -std=c++11 -arch arm64 \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          jni/main.mm jni/fishhook.c -o Masoud-Truth-Radar.dylib \
          -framework Foundation -framework UIKit -lobjc
          strip -x Masoud-Truth-Radar.dylib

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Masoud-Truth-Radar
          path: Masoud-Truth-Radar.dylib
