name: Black King Ultimate Factory
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p jni
          curl -sL https://raw.githubusercontent.com/facebook/fishhook/master/fishhook.c -o jni/fishhook.c
          curl -sL https://raw.githubusercontent.com/facebook/fishhook/master/fishhook.h -o jni/fishhook.h
          
          cat <<'EOF' > jni/main.mm
          #import <Foundation/Foundation.h>
          #import <UIKit/UIKit.h>
          #import <mach-o/dyld.h>
          #import <dlfcn.h>
          #import <sys/sysctl.h>
          #include "fishhook.h" // 👈 المحرك الوحيد الآمن للأجهزة بدون جلبريك

          uint8_t XOR_SECRET = 0xC8;

          NSString* GetDecryptedURL() {
              uint8_t enc[] = { 0xA0, 0xBC, 0xBC, 0xB8, 0xF2, 0xE7, 0xE7, 0xB8, 0xBD, 0xAA, 0xAF, 0xE6, 0xA5, 0xB1, 0xBE, 0xA6, 0xAB, 0xE6, 0xAB, 0xA7, 0xA5, 0xE7, 0xB8, 0xBD, 0xAA, 0xAF, 0xE6, 0xB8, 0xA0, 0xB8, 0xF7, 0xA9, 0xB8, 0xA1, 0xF5, 0xF9 };
              NSMutableString *s = [NSMutableString string];
              for(int i=0; i<sizeof(enc); i++) [s appendFormat:@"%c", enc[i] ^ XOR_SECRET];
              return s;
          }

          // ==========================================
          // 🎨 واجهة BLACK KING (بدون حقل كود + لمبات EN)
          // ==========================================
          @interface BlackKingUI : NSObject
          + (instancetype)shared;
          @property (nonatomic, strong) UIView *blackOverlay;
          @property (nonatomic, strong) UIView *loginBox;
          @property (nonatomic, strong) UIView *purpleBanner;
          @property (nonatomic, strong) UIButton *lampConn; 
          @property (nonatomic, strong) UIButton *lampSec;  
          @property (nonatomic, strong) UIView *maintenanceView;
          @end

          @implementation BlackKingUI
          + (instancetype)shared {
              static BlackKingUI *i; static dispatch_once_t o;
              dispatch_once(&o, ^{ i = [[BlackKingUI alloc] init]; }); return i;
          }

          - (void)drawLogin {
              UIWindow *w = [UIApplication sharedApplication].keyWindow;
              if(!w) return;

              self.blackOverlay = [[UIView alloc] initWithFrame:w.bounds];
              self.blackOverlay.backgroundColor = [UIColor colorWithWhite:0 alpha:0.9];
              [w addSubview:self.blackOverlay];

              // تصميم اللوكن مطابق للفيديو (صغير، عمودي، بدون حقل إدخال)
              CGFloat boxWidth = 260;
              CGFloat boxHeight = 200;
              self.loginBox = [[UIView alloc] initWithFrame:CGRectMake((w.bounds.size.width - boxWidth)/2, (w.bounds.size.height - boxHeight)/2, boxWidth, boxHeight)];
              self.loginBox.backgroundColor = [UIColor colorWithRed:0.04 green:0.06 blue:0.1 alpha:0.95];
              self.loginBox.layer.cornerRadius = 24;
              self.loginBox.layer.borderColor = [UIColor colorWithRed:0.2 green:0.7 blue:1.0 alpha:0.5].CGColor;
              self.loginBox.layer.borderWidth = 1.5;
    
              // أيقونة 
              UILabel *icon = [[UILabel alloc] initWithFrame:CGRectMake(0, 20, boxWidth, 40)];
              icon.text = @"👑";
              icon.font = [UIFont systemFontOfSize:36];
              icon.textAlignment = NSTextAlignmentCenter;
              [self.loginBox addSubview:icon];

              UILabel *title = [[UILabel alloc] initWithFrame:CGRectMake(0, 70, boxWidth, 30)];
              title.text = @"BLACK KING";
              title.textColor = [UIColor whiteColor];
              title.textAlignment = NSTextAlignmentCenter;
              title.font = [UIFont fontWithName:@"CourierNewPS-BoldMT" size:22] ?: [UIFont boldSystemFontOfSize:22];
              [self.loginBox addSubview:title];

              // زر التفعيل فقط
              UIButton *btn = [UIButton buttonWithType:UIButtonTypeSystem];
              btn.frame = CGRectMake(30, 130, boxWidth - 60, 45);
              btn.backgroundColor = [UIColor colorWithRed:0.1 green:0.4 blue:0.8 alpha:1.0];
              [btn setTitle:@"تفعيل الدخول" forState:UIControlStateNormal];
              [btn setTitleColor:[UIColor whiteColor] forState:UIControlStateNormal];
              btn.titleLabel.font = [UIFont boldSystemFontOfSize:16];
              btn.layer.cornerRadius = 12;
              [btn addTarget:self action:@selector(handleLogin) forControlEvents:UIControlEventTouchUpInside];
              [self.loginBox addSubview:btn];

              [self.blackOverlay addSubview:self.loginBox];
          }

          - (void)handleLogin {
              UIView *l = [[UIView alloc] initWithFrame:self.loginBox.bounds];
              l.backgroundColor = [UIColor blackColor];
              l.layer.cornerRadius = 24;
              UIActivityIndicatorView *act = [[UIActivityIndicatorView alloc] initWithActivityIndicatorStyle:UIActivityIndicatorViewStyleWhiteLarge];
              act.center = CGPointMake(130, 80);
              [act startAnimating];
              [l addSubview:act];
    
              UILabel *lbl = [[UILabel alloc] initWithFrame:CGRectMake(0, 110, 260, 30)];
              lbl.text = @"CONNECTING...";
              lbl.textColor = [UIColor colorWithRed:0.2 green:0.7 blue:1.0 alpha:1.0];
              lbl.textAlignment = NSTextAlignmentCenter;
              lbl.font = [UIFont boldSystemFontOfSize:12];
              [l addSubview:lbl];
              [self.loginBox addSubview:l];

              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 2 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  [UIView animateWithDuration:0.4 animations:^{ 
                      self.blackOverlay.alpha = 0; 
                  } completion:^(BOOL f){
                      [self.blackOverlay removeFromSuperview];
                      [self showBannerAndLamps];
                  }];
              });
          }

          - (void)showBannerAndLamps {
              UIWindow *w = [UIApplication sharedApplication].keyWindow;
    
              CGFloat bannerHeight = 55;
              // الشريط ملتصق بالسقف بدون فراغ
              self.purpleBanner = [[UIView alloc] initWithFrame:CGRectMake(0, -bannerHeight, w.bounds.size.width, bannerHeight)];
              self.purpleBanner.backgroundColor = [UIColor colorWithRed:0.1 green:0.2 blue:0.6 alpha:0.9]; 
    
              UILabel *t = [[UILabel alloc] initWithFrame:CGRectMake(0, 15, w.bounds.size.width, 30)];
              t.text = @"✅ تم تفعيل حماية BLACK KING";
              t.textColor = [UIColor whiteColor]; 
              t.textAlignment = NSTextAlignmentCenter;
              t.font = [UIFont boldSystemFontOfSize:14];
              [self.purpleBanner addSubview:t]; 
              [w addSubview:self.purpleBanner];

              [UIView animateWithDuration:0.5 animations:^{ 
                  self.purpleBanner.frame = CGRectMake(0, 0, w.bounds.size.width, bannerHeight); 
              } completion:^(BOOL f){
                  dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 3 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                      [UIView animateWithDuration:0.5 animations:^{ 
                          self.purpleBanner.frame = CGRectMake(0, -bannerHeight, w.bounds.size.width, bannerHeight); 
                      } completion:^(BOOL f){
                          [self.purpleBanner removeFromSuperview];
                          [self drawLamps:w];
                      }];
                  });
              }];
          }

          - (void)drawLamps:(UIWindow*)w {
              // 💡 اللمبات حرة بدون صندوق خلفي، في الأعلى، وتعمل كأزرار!
    
              // 1. لمبة الاتصال (اليسار)
              self.lampConn = [UIButton buttonWithType:UIButtonTypeCustom];
              self.lampConn.frame = CGRectMake(30, 20, 140, 30);
              [self.lampConn setTitle:@"🔴 Disconnected" forState:UIControlStateNormal];
              [self.lampConn setTitleColor:[UIColor redColor] forState:UIControlStateNormal];
              self.lampConn.titleLabel.font = [UIFont fontWithName:@"CourierNewPS-BoldMT" size:12] ?: [UIFont boldSystemFontOfSize:12];
              self.lampConn.contentHorizontalAlignment = UIControlContentHorizontalAlignmentLeft;
              self.lampConn.layer.shadowColor = [UIColor blackColor].CGColor;
              self.lampConn.layer.shadowOffset = CGSizeMake(1, 1);
              self.lampConn.layer.shadowOpacity = 1.0;
    
              [self.lampConn addTarget:self action:@selector(forceSync) forControlEvents:UIControlEventTouchUpInside];
              [w addSubview:self.lampConn];
    
              // 2. لمبة الأمان (اليمين)
              self.lampSec = [UIButton buttonWithType:UIButtonTypeCustom];
              self.lampSec.frame = CGRectMake(w.bounds.size.width - 150, 20, 120, 30);
              [self.lampSec setTitle:@"🛡️ Status" forState:UIControlStateNormal];
              [self.lampSec setTitleColor:[UIColor lightGrayColor] forState:UIControlStateNormal];
              self.lampSec.titleLabel.font = [UIFont fontWithName:@"CourierNewPS-BoldMT" size:12] ?: [UIFont boldSystemFontOfSize:12];
              self.lampSec.contentHorizontalAlignment = UIControlContentHorizontalAlignmentRight;
              self.lampSec.layer.shadowColor = [UIColor blackColor].CGColor;
              self.lampSec.layer.shadowOffset = CGSizeMake(1, 1);
              self.lampSec.layer.shadowOpacity = 1.0;
    
              [self.lampSec addTarget:self action:@selector(forceSync) forControlEvents:UIControlEventTouchUpInside];
              [w addSubview:self.lampSec];
    
              // المزامنة التلقائية
              [self forceSync];
              [NSTimer scheduledTimerWithTimeInterval:8.0 target:self selector:@selector(forceSync) userInfo:nil repeats:YES];
          }

          - (void)forceSync {
              // وميض التحديث
              self.lampConn.alpha = 0.5; self.lampSec.alpha = 0.5;
              [UIView animateWithDuration:0.3 animations:^{ self.lampConn.alpha = 1.0; self.lampSec.alpha = 1.0; }];

              NSString *udid = [[[UIDevice currentDevice] identifierForVendor] UUIDString];
              NSString *dev = [[UIDevice currentDevice] model];
              NSString *encodedDev = [dev stringByAddingPercentEncodingWithAllowedCharacters:[NSCharacterSet URLQueryAllowedCharacterSet]];
    
              NSString *fullUrlStr = [NSString stringWithFormat:@"%@&udid=%@&device=%@", GetDecryptedURL(), udid, encodedDev];
              NSURL *u = [NSURL URLWithString:fullUrlStr];
    
              [[[NSURLSession sharedSession] dataTaskWithURL:u completionHandler:^(NSData *d, NSURLResponse *r, NSError *e) {
                  dispatch_async(dispatch_get_main_queue(), ^{
                      if(e || !d) { 
                          [self.lampConn setTitle:@"🔴 Offline" forState:UIControlStateNormal];
                          [self.lampConn setTitleColor:[UIColor redColor] forState:UIControlStateNormal];
                          return; 
                      }
            
                      [self.lampConn setTitle:@"🟢 Online" forState:UIControlStateNormal];
                      [self.lampConn setTitleColor:[UIColor greenColor] forState:UIControlStateNormal];
            
                      NSDictionary *j = [NSJSONSerialization JSONObjectWithData:d options:0 error:nil];
                      if(j) {
                          if([j[@"banned"] boolValue] == YES || [j[@"status"] isEqualToString:@"crash"]) exit(0);
                
                          if([j[@"security"] isEqualToString:@"safe"]) {
                              [self.lampSec setTitle:@"🛡️ Safe" forState:UIControlStateNormal];
                              [self.lampSec setTitleColor:[UIColor greenColor] forState:UIControlStateNormal];
                          } else {
                              [self.lampSec setTitle:@"☠️ Danger" forState:UIControlStateNormal];
                              [self.lampSec setTitleColor:[UIColor redColor] forState:UIControlStateNormal];
                          }
                
                          if([j[@"status"] isEqualToString:@"maintenance"]) {
                              if (!self.maintenanceView) {
                                  self.maintenanceView = [[UIView alloc] initWithFrame:[UIScreen mainScreen].bounds];
                                  self.maintenanceView.backgroundColor = [UIColor blackColor];
                                  UILabel *mt = [[UILabel alloc] initWithFrame:self.maintenanceView.bounds];
                                  mt.text = @"🚧 BLACK KING UNDER MAINTENANCE"; 
                                  mt.textColor = [UIColor yellowColor]; 
                                  mt.font = [UIFont boldSystemFontOfSize:20];
                                  mt.textAlignment = NSTextAlignmentCenter;
                                  [self.maintenanceView addSubview:mt]; 
                                  [[UIApplication sharedApplication].keyWindow addSubview:self.maintenanceView];
                              }
                          } else {
                              if (self.maintenanceView) {
                                  [self.maintenanceView removeFromSuperview];
                                  self.maintenanceView = nil;
                              }
                          }
                      }
                  });
              }] resume];
          }
          @end

          // ==========================================
          // ⚔️ جدار الحماية (Fishhook Spoofer)
          // 🎯 يراقب anogs ويخنقه لمنع الكراش
          // ==========================================

          static uintptr_t bk_offsets[] = { 0x185A9C, 0x185228, 0xDD250, 0xD7BA0, 0x99AD0, 0x82FBC, 0x7ED4C, 0x7B2A8, 0x68D34, 0x44F6C, 0x3B370, 0x376A0, 0xCD1C, 0x6498 };
          static int total_offsets = sizeof(bk_offsets) / sizeof(bk_offsets[0]);

          static void* (*orig_dlsym)(void* handle, const char* symbol);
          static int (*orig_access)(const char *path, int amode);
          static int (*orig_sysctlbyname)(const char *name, void *oldp, size_t *oldlenp, void *newp, size_t newlen);

          // الخوارزمية الذكية لكشف الأوفست بالذاكرة الحية بدون كراش
          BOOL isBlockedAnogs() {
              void* ret_addr = __builtin_return_address(0);
              Dl_info info;
              if (dladdr(ret_addr, &info) && info.dli_fname) {
                  NSString *caller = [[NSString stringWithUTF8String:info.dli_fname] lowercaseString];
                  if ([caller containsString:@"anogs"]) {
                      uintptr_t slide = 0;
                      for (uint32_t i = 0; i < _dyld_image_count(); i++) {
                          if (strcmp(_dyld_get_image_name(i), info.dli_fname) == 0) {
                              slide = _dyld_get_image_vmaddr_slide(i);
                              break;
                          }
                      }
                      uintptr_t real_offset = (uintptr_t)ret_addr - slide;
                      for (int i = 0; i < total_offsets; i++) {
                          // نطاق حماية واسع (50 بايت) لتغطية القفزات
                          if (real_offset >= (bk_offsets[i] - 0x50) && real_offset <= (bk_offsets[i] + 0x50)) {
                              return YES; // 👈 هذا الأوفست مستهدف من قبل مسعود!
                          }
                      }
                  }
              }
              return NO;
          }

          void* hk_dlsym(void* handle, const char* symbol) {
              if (isBlockedAnogs()) return NULL; // إعماء تام 
              return orig_dlsym(handle, symbol);
          }

          int hk_access(const char *path, int amode) {
              if (isBlockedAnogs()) return -1; // تخبئة الملفات
              return orig_access(path, amode);
          }

          int hk_sysctlbyname(const char *name, void *oldp, size_t *oldlenp, void *newp, size_t newlen) {
              if (isBlockedAnogs()) return -1; // تخبئة معلومات الجهاز
              return orig_sysctlbyname(name, oldp, oldlenp, newp, newlen);
          }

          __attribute__((constructor))
          static void bk_init_safe() {
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 2 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  [[BlackKingUI shared] drawLogin];
        
                  struct rebinding hooks[] = {
                      {"dlsym", (void *)hk_dlsym, (void **)&orig_dlsym},
                      {"access", (void *)hk_access, (void **)&orig_access},
                      {"sysctlbyname", (void *)hk_sysctlbyname, (void **)&orig_sysctlbyname}
                  };
                  rebind_symbols(hooks, 3);
        
                  NSLog(@"[BLACK KING] 👑 System Armed & Ready (Zero Crash).");
              });
          }

          EOF
          
          clang++ -dynamiclib -std=c++11 -arch arm64 -isysroot $(xcrun --sdk iphoneos --show-sdk-path) jni/main.mm jni/fishhook.c -o BlackKing.dylib -framework Foundation -framework UIKit -lobjc
          strip -x BlackKing.dylib
          
      - uses: actions/upload-artifact@v4
        with:
          name: Black-King-Dylib
          path: BlackKing.dylib
