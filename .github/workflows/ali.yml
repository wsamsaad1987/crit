name: Imperial V-MAX - Sniper Firewall (Offset 0x459C)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_sniper_firewall:
    name: Compile Sniper Firewall Dylib
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Fishhook
        run: |
          mkdir -p jni
          curl -sL https://raw.githubusercontent.com/facebook/fishhook/master/fishhook.c -o jni/fishhook.cpp
          curl -sL https://raw.githubusercontent.com/facebook/fishhook/master/fishhook.h -o jni/fishhook.h

      - name: Generate C++ Payload (Main.mm)
        run: |
          cat <<'EOF' > jni/main.mm
          #import <Foundation/Foundation.h>
          #import <dlfcn.h>
          #import <sys/sysctl.h>
          #include "fishhook.h"

          /**
           * ========================================================
           * 🛡️ MASOUD SNIPER FIREWALL - TARGETING OFFSET 0x459C
           * ========================================================
           */

          static int (*orig_sysctlbyname)(const char *name, void *oldp, size_t *oldlenp, void *newp, size_t newlen);
          static void* (*orig_dlsym)(void* handle, const char* symbol);
          static FILE* (*orig_fopen)(const char *filename, const char *mode);

          // 🎯 دالة القناص: ترجع الأوفست الحقيقي اللي انطلق منه الجاسوس
          uintptr_t GetAnogsCallerOffset() {
              void* ret_addr = __builtin_return_address(0);
              Dl_info info;
              if (dladdr(ret_addr, &info) && info.dli_fname) {
                  NSString *caller = [[NSString stringWithUTF8String:info.dli_fname] lowercaseString];
                  if ([caller containsString:@"anogs"]) {
                      // حساب الأوفست كما يظهر في IDA Pro بالضبط
                      return (uintptr_t)ret_addr - (uintptr_t)info.dli_fbase;
                  }
              }
              return 0; // إذا لم يكن anogs، نرجع 0
          }

          // ==========================================
          // ⚔️ جدار الحماية (قناص الأوفستات)
          // ==========================================

          int hk_sysctlbyname(const char *name, void *oldp, size_t *oldlenp, void *newp, size_t newlen) {
              return orig_sysctlbyname(name, oldp, oldlenp, newp, newlen);
          }

          void* hk_dlsym(void* handle, const char* symbol) {
              uintptr_t caller_offset = GetAnogsCallerOffset();
              
              // 🔥 السحر هنا: نستخدم أوفست مسعود الذهبي!
              // إذا كان الجاسوس يتصل من الأوفست 0x459C أو الأوفستات القريبة منه (دالة sub_4580)
              if (caller_offset > 0x4500 && caller_offset < 0x4600) {
                  if (symbol) {
                      NSString *symStr = [NSString stringWithUTF8String:symbol];
                      
                      NSArray *blocked_symbols = @[@"ptrace", @"MSHook", @"Substrate", @"fishhook", 
                                                 @"sel_registerName", @"objc_getClass"];
                      
                      for (NSString *blocked in blocked_symbols) {
                          if ([symStr containsString:blocked]) {
                              // إعماء الجاسوس فقط في هذه المنطقة الحساسة!
                              NSLog(@"[MASOUD SNIPER] Headshot at Offset 0x%lx! Blocked: %@", caller_offset, symStr);
                              return NULL; 
                          }
                      }
                  }
              }
              return orig_dlsym(handle, symbol);
          }

          FILE* hk_fopen(const char *filename, const char *mode) {
              uintptr_t caller_offset = GetAnogsCallerOffset();
              
              // أوفست اللوغات اللي اكتشفناه سابقاً 0x4664
              if (caller_offset > 0x4600 && caller_offset < 0x4700) {
                  if (filename) {
                      NSString *fileStr = [NSString stringWithUTF8String:filename];
                      if ([fileStr containsString:@"Cydia"] || [fileStr containsString:@"TDM_KV"]) {
                          NSLog(@"[MASOUD SNIPER] Blocked file read at Offset 0x%lx: %@", caller_offset, fileStr);
                          return NULL; 
                      }
                  }
              }
              return orig_fopen(filename, mode);
          }

          // ==========================================
          // 🚀 التشغيل الصامت
          // ==========================================
          __attribute__((constructor))
          static void start_sniper_firewall() {
              NSLog(@"[MASOUD LAB] 🦅 SNIPER FIREWALL LOADED! Watching Offset 0x459C...");
              
              struct rebinding hooks[] = {
                  {"sysctlbyname", (void *)hk_sysctlbyname, (void **)&orig_sysctlbyname},
                  {"dlsym", (void *)hk_dlsym, (void **)&orig_dlsym},
                  {"fopen", (void *)hk_fopen, (void **)&orig_fopen}
              };
              rebind_symbols(hooks, 3);
          }
          EOF

      - name: Compile Sniper Firewall
        run: |
          clang++ -dynamiclib -std=c++11 -arch arm64 \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          jni/main.mm jni/fishhook.cpp -o Masoud-Sniper-Firewall.dylib \
          -framework Foundation
          strip -x Masoud-Sniper-Firewall.dylib

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Masoud-Sniper-Firewall
          path: Masoud-Sniper-Firewall.dylib
